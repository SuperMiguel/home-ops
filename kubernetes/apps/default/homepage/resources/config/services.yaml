# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/services
#
# Aligned with Argo apps: Proxmox nodes, Kubernetes (Argo, Gatus), observability (Grafana, Prometheus,
# Alertmanager, Victoria Logs), Longhorn, media namespace workloads.

# Icons:
# https://github.com/walkxcode/dashboard-icons

- Proxmox Cluster:
    - HL-PVE-30:
        icon: proxmox.png
        ping: 10.0.20.30
        widget:
          type: proxmox
          url: https://10.0.20.30:8006
          username: api-homepage@pam!homepage
          password: {{HOMEPAGE_VAR_PROXMOX_API_PASSWORD}}
          node: HL-PVE-30
    - HL-PVE-31:
        icon: proxmox.png
        ping: 10.0.20.31
        widget:
          type: proxmox
