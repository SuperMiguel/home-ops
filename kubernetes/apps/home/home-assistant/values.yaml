# Fresh Home Assistant — config in Git (config/ → ConfigMaps). See README.md.
# LAN: 10.0.20.50 | https://hass.veliz.cc | MQTT: packages/mqtt.yaml
controllers:
  home-assistant:
    strategy: Recreate
    pod:
      annotations:
        configmap.reloader.stakater.com/reload: home-assistant-config,home-assistant-packages,home-assistant-dashboards
    initContainers:
      bootstrap-custom-components:
        image:
          repository: alpine
          tag: "3.21"
        # Pod defaults to runAsUser 1000; apk needs root for this one-shot install.
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
        command:
          - /bin/sh
          - -c
          - |
            set -e
            CC=/config/custom_components
            mkdir -p "${CC}"
            apk add --no-cache curl unzip >/dev/null
            # hacs.zip unpacks flat (no hacs/ prefix) — must target ${CC}/hacs/
            if [ -f "${CC}/manifest.json" ] && [ ! -f "${CC}/hacs/manifest.json" ]; then
              echo "Removing mistaken flat HACS extract..."
              find "${CC}" -mindepth 1 -maxdepth 1 ! -name hubitat -exec rm -rf {} +
            fi
            if [ ! -f "${CC}/hacs/manifest.json" ]; then
              echo "Installing HACS 2.0.5..."
              mkdir -p "${CC}/hacs"
              curl -fsSL -o /tmp/hacs.zip https://github.com/hacs/integration/releases/download/2.0.5/hacs.zip
              unzip -q -o /tmp/hacs.zip -d "${CC}/hacs"
            else
              echo "HACS already present"
            fi
            if [ ! -f "${CC}/hubitat/manifest.json" ]; then
              echo "Installing Hubitat integration v0.10.3..."
              curl -fsSL -o /tmp/hubitat.zip https://github.com/jason0x43/hacs-hubitat/archive/refs/tags/v0.10.3.zip
              unzip -q /tmp/hubitat.zip -d /tmp
              cp -r /tmp/hacs-hubitat-*/custom_components/hubitat "${CC}/"
            else
              echo "Hubitat already present"
            fi
            chown -R 1000:1000 "${CC}"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/home-assistant
          tag: "2026.5.4"
        env:
          TZ: America/New_York
          # Envoy / in-cluster clients and VLAN 20 servers (Node-RED, LAN devices)
          HASS_HTTP_TRUSTED_PROXY_1: 10.42.0.0/16
          HASS_HTTP_TRUSTED_PROXY_2: 10.0.20.0/24
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: &port 8123
              initialDelaySeconds: 300
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 60
              periodSeconds: 15
              timeoutSeconds: 10
              failureThreshold: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              failureThreshold: 60
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 20Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  configuration:
    enabled: true
    type: configMap
    name: home-assistant-config
    globalMounts:
      - path: /config/configuration.yaml
        subPath: configuration.yaml
  packages:
    enabled: true
    type: configMap
    name: home-assistant-packages
    globalMounts:
      - path: /config/packages/mqtt.yaml
        subPath: mqtt.yaml
      - path: /config/packages/lovelace.yaml
        subPath: lovelace.yaml
  dashboards:
    enabled: true
    type: configMap
    name: home-assistant-dashboards
    globalMounts:
      - path: /config/dashboards/tablet.yaml
        subPath: tablet.yaml
  cache:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: longhorn
    globalMounts:
      - path: /config/.venv
  tmp:
    type: emptyDir
service:
  app:
    ports:
      http:
        port: *port
        appProtocol: kubernetes.io/ws
  lan:
    controller: home-assistant
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: "10.0.20.50"
    ports:
      http:
        port: *port
        protocol: TCP
route:
  app:
    hostnames:
      - hass.veliz.cc
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
