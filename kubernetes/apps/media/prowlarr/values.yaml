# API key: Secret media-arr-api (ExternalSecret → 1Password homelab-media-api-keys/PROWLARR_API_KEY).
# Image: ghcr.io/home-operations/prowlarr — see https://github.com/home-operations/containers
# To feed Radarr indexers: Settings → Apps → Add Radarr — http://radarr.media.svc.cluster.local:80 + Radarr API key.
controllers:
  prowlarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/prowlarr
          # GHCR has no `latest`; use `rolling` or pin a semver (e.g. 2.3.4.5307).
          tag: 2.3.5.5327
        env:
          TZ: America/New_York
          PROWLARR__APP__INSTANCENAME: Prowlarr
          PROWLARR__APP__THEME: dark
          PROWLARR__AUTH__METHOD: External
          PROWLARR__AUTH__REQUIRED: DisabledForLocalAddresses
          PROWLARR__LOG__DBENABLED: "False"
          PROWLARR__LOG__LEVEL: info
          PROWLARR__SERVER__PORT: &port 80
          PROWLARR__UPDATE__BRANCH: develop
          PROWLARR__AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PROWLARR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: *port
              initialDelaySeconds: 45
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: *port
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 768Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - prowlarr.veliz.cc
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /
