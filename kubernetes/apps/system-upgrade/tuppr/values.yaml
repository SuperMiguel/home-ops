# tuppr — Talos + Kubernetes upgrade controller (home-operations/tuppr).
# Mirrors onedr0p/home-ops kubernetes/apps/system-upgrade/tuppr (Flux → Argo CD).
# Prerequisites: `machine.features.kubernetesTalosAPIAccess` in talos/talconfig.yaml (global patch),
# rendered by `task talos:generate-config`, then applied to all nodes (`task talos:apply-node`).
#
# If Argo sync fails with talos.dev/ServiceAccount v1alpha1: nodes are missing that feature or the
# CRD is not registered yet — confirm generated clusterconfig contains kubernetesTalosAPIAccess.
replicaCount: 2

monitoring:
  serviceMonitor:
    enabled: true
