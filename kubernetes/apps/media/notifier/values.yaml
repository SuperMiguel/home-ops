# Notifier — ghcr.io/home-operations/webhook (adnanh/webhook) + Apprise → Pushover.
# Based on https://github.com/onedr0p/home-ops/tree/main/kubernetes/apps/default/notifier
# Webhook URLs (HTTPS via Envoy): https://notifier.veliz.cc/hooks/{radarr-pushover,seerr-pushover,sonarr-pushover}
# Radarr/Sonarr Connect webhooks are applied by CronJob `arr-webhooks` (cluster URLs to notifier Service).
# Seerr: add webhook in UI or extend the script (different API). Secrets: notifier-secret (PUSHOVER_* from media-arr-api).
# Manual run: kubectl create job -n media notifier-arr-webhooks-manual --from=cronjob/notifier-arr-webhooks
# Edit hook scripts under resources/ and mirror into configMaps below (Helm has no file include).
controllers:
  notifier:
    replicas: 1
    strategy: RollingUpdate
    pod:
      annotations:
        configmap.reloader.stakater.com/reload: notifier
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/webhook
          tag: 2.8.3@sha256:b5a6defe3462a7bba13342bb878b20504f3699644a442039dad21285edca0082
        env:
          WEBHOOK__PORT: &port 80
          TZ: America/New_York
        envFrom:
          - secretRef:
              name: notifier-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 10
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 5
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              failureThreshold: 30
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 512Mi
  # Idempotent: POST/PUT Radarr + Sonarr /api/v3/notification (Webhook → notifier hooks). Uses media-arr-api keys.
  arr-webhooks:
    type: cronjob
    cronjob:
      schedule: "0 5 * * *"
      timeZone: America/New_York
      concurrencyPolicy: Forbid
      successfulJobsHistory: 1
      failedJobsHistory: 3
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      activeDeadlineSeconds: 900
    pod:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 0
        runAsGroup: 0
    containers:
      app:
        image:
          repository: docker.io/library/alpine
          tag: "3.20"
        command:
          - /bin/sh
          - -c
          - |
            set -eu
            apk add --no-cache curl jq >/dev/null

            NOTIFICATION_NAME="Notifier (Pushover webhook)"
            RADARR_URL="${RADARR_URL:-http://radarr.media.svc.cluster.local:80}"
            SONARR_URL="${SONARR_URL:-http://sonarr.media.svc.cluster.local:80}"
            BASE="${NOTIFIER_WEBHOOK_BASE:-http://notifier.media.svc.cluster.local/hooks}"
            RADARR_HOOK="${BASE}/radarr-pushover"
            SONARR_HOOK="${BASE}/sonarr-pushover"

            wait_ping() {
              url="$1"
              label="$2"
              for _ in $(seq 1 90); do
                code=$(curl -sS -o /dev/null -w "%{http_code}" "${url}/ping" || true)
                if [ "$code" = "200" ]; then
                  echo "${label} ready."
                  return 0
                fi
                sleep 5
              done
              echo "${label} /ping not ready (last HTTP ${code})" >&2
              exit 1
            }

            wait_ping "$RADARR_URL" "Radarr"
            wait_ping "$SONARR_URL" "Sonarr"

            upsert_radarr() {
              id=$(curl -fsS "${RADARR_URL}/api/v3/notification" -H "X-Api-Key: ${RADARR_API_KEY}" \
                | jq -r --arg n "$NOTIFICATION_NAME" '.[] | select(.name == $n) | .id // empty' | head -1)
              if [ -n "$id" ]; then
                full=$(curl -fsS "${RADARR_URL}/api/v3/notification/${id}" -H "X-Api-Key: ${RADARR_API_KEY}")
                upd=$(echo "$full" | jq --arg u "$RADARR_HOOK" '
                  .fields |= map(if ((.name // "") | ascii_downcase) == "url" then .value = $u else . end)
                  | .onGrab = true
                  | .onDownload = true
                  | .onUpgrade = true
                  | .onRename = false
                  | .onMovieAdded = false
                  | .onMovieDelete = false
                  | .onMovieFileDelete = false
                  | .onMovieFileDeleteForUpgrade = false
                  | .onHealthIssue = true
                  | .includeHealthWarnings = true
                  | .onHealthRestored = false
                  | .onApplicationUpdate = true
                  | .onManualInteractionRequired = true
                ')
                curl -fsS -X PUT "${RADARR_URL}/api/v3/notification/${id}" \
                  -H "X-Api-Key: ${RADARR_API_KEY}" -H "Content-Type: application/json" -d "$upd" >/dev/null
                echo "Radarr: updated webhook notification id=${id}."
              else
                body=$(jq -n --arg u "$RADARR_HOOK" '
                  {
                    name: "Notifier (Pushover webhook)",
                    implementation: "Webhook",
                    configContract: "WebhookSettings",
                    onGrab: true,
                    onDownload: true,
                    onUpgrade: true,
                    onRename: false,
                    onMovieAdded: false,
                    onMovieDelete: false,
                    onMovieFileDelete: false,
                    onMovieFileDeleteForUpgrade: false,
                    onHealthIssue: true,
                    includeHealthWarnings: true,
                    onHealthRestored: false,
                    onApplicationUpdate: true,
                    onManualInteractionRequired: true,
                    fields: [
                      {name: "url", value: $u},
                      {name: "method", value: 1},
                      {name: "username", value: ""},
                      {name: "password", value: ""}
                    ]
                  }
                ')
                curl -fsS -X POST "${RADARR_URL}/api/v3/notification" \
                  -H "X-Api-Key: ${RADARR_API_KEY}" -H "Content-Type: application/json" -d "$body" >/dev/null
                echo "Radarr: created webhook notification."
              fi
            }

            upsert_sonarr() {
              id=$(curl -fsS "${SONARR_URL}/api/v3/notification" -H "X-Api-Key: ${SONARR_API_KEY}" \
                | jq -r --arg n "$NOTIFICATION_NAME" '.[] | select(.name == $n) | .id // empty' | head -1)
              if [ -n "$id" ]; then
                full=$(curl -fsS "${SONARR_URL}/api/v3/notification/${id}" -H "X-Api-Key: ${SONARR_API_KEY}")
                upd=$(echo "$full" | jq --arg u "$SONARR_HOOK" '
                  .fields |= map(if ((.name // "") | ascii_downcase) == "url" then .value = $u else . end)
                  | .onGrab = true
                  | .onDownload = true
                  | .onUpgrade = true
                  | .onImportComplete = false
                  | .onRename = false
                  | .onSeriesAdd = false
                  | .onSeriesDelete = false
                  | .onEpisodeFileDelete = false
                  | .onEpisodeFileDeleteForUpgrade = false
                  | .onHealthIssue = true
                  | .includeHealthWarnings = true
                  | .onHealthRestored = false
                  | .onApplicationUpdate = true
                  | .onManualInteractionRequired = true
                ')
                curl -fsS -X PUT "${SONARR_URL}/api/v3/notification/${id}" \
                  -H "X-Api-Key: ${SONARR_API_KEY}" -H "Content-Type: application/json" -d "$upd" >/dev/null
                echo "Sonarr: updated webhook notification id=${id}."
              else
                body=$(jq -n --arg u "$SONARR_HOOK" '
                  {
                    name: "Notifier (Pushover webhook)",
                    implementation: "Webhook",
                    configContract: "WebhookSettings",
                    onGrab: true,
                    onDownload: true,
                    onUpgrade: true,
                    onImportComplete: false,
                    onRename: false,
                    onSeriesAdd: false,
                    onSeriesDelete: false,
                    onEpisodeFileDelete: false,
                    onEpisodeFileDeleteForUpgrade: false,
                    onHealthIssue: true,
                    includeHealthWarnings: true,
                    onHealthRestored: false,
                    onApplicationUpdate: true,
                    onManualInteractionRequired: true,
                    fields: [
                      {name: "url", value: $u},
                      {name: "method", value: 1},
                      {name: "username", value: ""},
                      {name: "password", value: ""}
                    ]
                  }
                ')
                curl -fsS -X POST "${SONARR_URL}/api/v3/notification" \
                  -H "X-Api-Key: ${SONARR_API_KEY}" -H "Content-Type: application/json" -d "$body" >/dev/null
                echo "Sonarr: created webhook notification."
              fi
            }

            upsert_radarr
            upsert_sonarr
            echo "Done."
        env:
          - name: RADARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: RADARR_API_KEY
          - name: SONARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SONARR_API_KEY
          - name: RADARR_URL
            value: "http://radarr.media.svc.cluster.local:80"
          - name: SONARR_URL
            value: "http://sonarr.media.svc.cluster.local:80"
          - name: NOTIFIER_WEBHOOK_BASE
            value: "http://notifier.media.svc.cluster.local/hooks"
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
service:
  app:
    controller: notifier
    ports:
      http:
        port: *port

configMaps:
  notifier-config:
    data:
      hooks.yaml: |
        ---
        - id: radarr-pushover
          execute-command: /config/radarr-pushover.sh
          pass-arguments-to-command:
            - source: entire-payload

        - id: seerr-pushover
          execute-command: /config/seerr-pushover.sh
          pass-arguments-to-command:
            - source: entire-payload

        - id: sonarr-pushover
          execute-command: /config/sonarr-pushover.sh
          pass-arguments-to-command:
            - source: entire-payload
      radarr-pushover.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Incoming arguments
        PAYLOAD=${1:-}

        # Required environment variables
        : "${APPRISE_RADARR_PUSHOVER_URL:?Pushover URL required}"

        echo "[DEBUG] Radarr Payload: ${PAYLOAD}"

        function _jq() {
            jq -r "${1:?}" <<<"${PAYLOAD}"
        }

        function notify() {
            local event_type=$(_jq '.eventType')

            case "${event_type}" in
                "Download")
                    printf -v PUSHOVER_TITLE "Movie %s" \
                        "$( [[ "$(_jq '.isUpgrade')" == "true" ]] && echo "Upgraded" || echo "Added" )"
                    printf -v PUSHOVER_MESSAGE "<b>%s (%s)</b><small>\n%s</small><small>\n\n<b>Client:</b> %s</small>" \
                        "$(_jq '.movie.title')" \
                        "$(_jq '.movie.year')" \
                        "$(_jq '.movie.overview')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/movie/%s" \
                        "$(_jq '.applicationUrl')" \
                        "$(_jq '.movie.tmdbId')"
                    printf -v PUSHOVER_URL_TITLE "View Movie"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                "ManualInteractionRequired")
                    printf -v PUSHOVER_TITLE "Movie Requires Manual Interaction"
                    printf -v PUSHOVER_MESSAGE "<b>%s (%s)</b><small>\n<b>Client:</b> %s</small>" \
                        "$(_jq '.movie.title')" \
                        "$(_jq '.movie.year')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/activity/queue" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Queue"
                    printf -v PUSHOVER_PRIORITY "high"
                    ;;
                "Test")
                    printf -v PUSHOVER_TITLE "Test Notification"
                    printf -v PUSHOVER_MESSAGE "Howdy this is a test notification"
                    printf -v PUSHOVER_URL "%s" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Movies"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                *)
                    echo "[ERROR] Unknown event type: ${event_type}" >&2
                    return 1
                    ;;
            esac

            apprise -vv --title "${PUSHOVER_TITLE}" --body "${PUSHOVER_MESSAGE}" --input-format html \
                "${APPRISE_RADARR_PUSHOVER_URL}?url=${PUSHOVER_URL}&url_title=${PUSHOVER_URL_TITLE}&priority=${PUSHOVER_PRIORITY}"
        }

        function main() {
            notify
        }

        main "$@"
      seerr-pushover.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Incoming arguments
        PAYLOAD=${1:-}

        # Required environment variables
        : "${APPRISE_SEERR_PUSHOVER_URL:?Pushover URL required}"

        echo "[DEBUG] Seerr Payload: ${PAYLOAD}"

        function _jq() {
            jq -r "${1:?}" <<<"${PAYLOAD}"
        }

        function notify() {
            local event_type=$(_jq '.notification_type')

            case "${event_type}" in
                "TEST_NOTIFICATION")
                    printf -v PUSHOVER_TITLE "Test Notification"
                    printf -v PUSHOVER_MESSAGE "Howdy this is a test notification from <b>%s</b>" "Seerr"
                    printf -v PUSHOVER_URL "%s" "https://seerr.veliz.cc"
                    printf -v PUSHOVER_URL_TITLE "Open %s" "Seerr"
                    printf -v PUSHOVER_PRIORITY "%s" "low"
                    ;;
                *)
                    echo "[ERROR] Unknown event type: ${event_type}" >&2
                    return 1
                    ;;
            esac

            apprise -vv --title "${PUSHOVER_TITLE}" --body "${PUSHOVER_MESSAGE}" --input-format html \
                "${APPRISE_SEERR_PUSHOVER_URL}?url=${PUSHOVER_URL}&url_title=${PUSHOVER_URL_TITLE}&priority=${PUSHOVER_PRIORITY}"
        }

        function main() {
            notify
        }

        main "$@"
      sonarr-pushover.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Incoming arguments
        PAYLOAD=${1:-}

        # Required environment variables
        : "${APPRISE_SONARR_PUSHOVER_URL:?Pushover URL required}"

        echo "[DEBUG] Sonarr Payload: ${PAYLOAD}"

        function _jq() {
            jq -r "${1:?}" <<<"${PAYLOAD}"
        }

        function notify() {
            local event_type=$(_jq '.eventType')

            case "${event_type}" in
                "Download")
                    printf -v PUSHOVER_TITLE \
                        "Episode %s" "$( [[ "$(_jq '.isUpgrade')" == "true" ]] && echo "Upgraded" || echo "Added" )"
                    printf -v PUSHOVER_MESSAGE "<b>%s (S%02dE%02d)</b><small>\n%s</small><small>\n\n<b>Client:</b> %s</small>" \
                        "$(_jq '.series.title')" \
                        "$(_jq '.episodes[0].seasonNumber')" \
                        "$(_jq '.episodes[0].episodeNumber')" \
                        "$(_jq '.episodes[0].title')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/series/%s" \
                        "$(_jq '.applicationUrl')" \
                        "$(_jq '.series.titleSlug')"
                    printf -v PUSHOVER_URL_TITLE "View Series"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                "ManualInteractionRequired")
                    printf -v PUSHOVER_TITLE "Episode Requires Manual Interaction"
                    printf -v PUSHOVER_MESSAGE "<b>%s</b><small>\n<b>Client:</b> %s</small>" \
                        "$(_jq '.series.title')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/activity/queue" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Queue"
                    printf -v PUSHOVER_PRIORITY "high"
                    ;;
                "Test")
                    printf -v PUSHOVER_TITLE "Test Notification"
                    printf -v PUSHOVER_MESSAGE "Howdy this is a test notification"
                    printf -v PUSHOVER_URL "%s" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Series"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                *)
                    echo "[ERROR] Unknown event type: ${event_type}" >&2
                    return 1
                    ;;
            esac

            apprise -vv --title "${PUSHOVER_TITLE}" --body "${PUSHOVER_MESSAGE}" --input-format html \
                "${APPRISE_SONARR_PUSHOVER_URL}?url=${PUSHOVER_URL}&url_title=${PUSHOVER_URL_TITLE}&priority=${PUSHOVER_PRIORITY}"
        }

        function main() {
            notify
        }

        main "$@"

persistence:
  config:
    type: configMap
    identifier: notifier-config
    defaultMode: 0775
    globalMounts:
      - path: /config
        readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
route:
  app:
    hostnames:
      - notifier.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
