# Gatus — https://github.com/TwiN/gatus
controllers:
  gatus:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: twinproduction/gatus
          tag: v5.34.0
        env:
          TZ: America/New_York
          GATUS_CONFIG_PATH: /config/config.yaml
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 20
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
          limits:
            memory: 256Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
service:
  app:
    ports:
      http:
        port: 8080
configMaps:
  config:
    data:
      config.yaml: |
        storage:
          type: sqlite
          path: /data/sqlite.db
        ui:
          title: Status
          header: Veliz
        endpoints:
          - name: home
            group: core
            url: https://home.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: argo
            group: core
            url: https://argo.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: prowlarr
            group: media
            url: https://prowlarr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: sonarr
            group: media
            url: https://sonarr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: radarr
            group: media
            url: https://radarr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: sabnzbd
            group: media
            url: https://sabnzbd.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: seerr
            group: media
            url: https://seerr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: agregarr
            group: media
            url: https://agregarr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: autobrr
            group: media
            url: https://autobrr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: deduparr
            group: media
            url: https://deduparr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: brrpolice
            group: media
            url: https://brrpolice.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: seasonpackerr
            group: media
            url: https://seasonpackerr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: bazarr
            group: media
            url: https://bazarr.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
          - name: tautulli
            group: media
            url: https://tautulli.veliz.cc
            interval: 5m
            conditions:
              - "[STATUS] == 200"
persistence:
  config:
    type: configMap
    identifier: config
    globalMounts:
      - path: /config/config.yaml
        subPath: config.yaml
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: longhorn
    globalMounts:
      - path: /data
route:
  app:
    hostnames:
      - gatus.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 8080
