controllers:
  homepage:
    strategy: RollingUpdate
    # ConfigMap keys are mounted with subPath; kubelet does not refresh them when the CM changes.
    # Reloader rolls the pod when homepage-config updates so the UI matches Git.
    pod:
      annotations:
        configmap.reloader.stakater.com/reload: homepage-config
    containers:
      app:
        # Homepage (gethomepage/homepage) has no ghcr.io/home-operations/ build — see home-operations/containers apps/.
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.1.0
        env:
          HOMEPAGE_ALLOWED_HOSTS: home.veliz.cc
          HOMEPAGE_VAR_PROXMOX_API_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: PROXMOX_API_PASSWORD
          HOMEPAGE_VAR_UNIFI_USERNAME:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: UNIFI_USERNAME
          HOMEPAGE_VAR_UNIFI_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: UNIFI_PASSWORD
          HOMEPAGE_VAR_HOMEBRIDGE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: HOMEBRIDGE_PASSWORD
          HOMEPAGE_VAR_OPENMETEO_LATITUDE:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: OPENMETEO_LATITUDE
          HOMEPAGE_VAR_OPENMETEO_LONGITUDE:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: OPENMETEO_LONGITUDE
          HOMEPAGE_VAR_SONARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: SONARR_API_KEY
          HOMEPAGE_VAR_RADARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: RADARR_API_KEY
          HOMEPAGE_VAR_PROWLARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: PROWLARR_API_KEY
          HOMEPAGE_VAR_SABNZBD_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: SABNZBD_API_KEY
          HOMEPAGE_VAR_TAUTULLI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: TAUTULLI_API_KEY
          HOMEPAGE_VAR_BAZARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: BAZARR_API_KEY
          HOMEPAGE_VAR_OVERSEERR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: OVERSEERR_API_KEY
          HOMEPAGE_VAR_SEERR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: SEERR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
service:
  app:
    ports:
      http:
        port: 3000
persistence:
  config-workspace:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config
  config-files:
    type: custom
    volumeSpec:
      configMap:
        name: homepage-config
    globalMounts:
      - path: /app/config/services.yaml
        subPath: services.yaml
      - path: /app/config/settings.yaml
        subPath: settings.yaml
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
route:
  app:
    hostnames:
      - home.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 3000
