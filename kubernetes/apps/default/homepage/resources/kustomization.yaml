apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: homepage-config
    files:
      - config/services.yaml
      - config/settings.yaml
      - config/widgets.yaml
      - config/bookmarks.yaml

resources:
  - homepage-secrets-externalsecret.yaml
