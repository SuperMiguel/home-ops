# Longhorn Helm chart (see kubernetes/argo/apps/kube-system/longhorn.yaml).
# defaultReplicaCount + persistence.defaultClassReplicaCount must match so new PVCs
# and the StorageClass stay aligned (see Longhorn docs).
#
# Small 120 GiB PNY disks per node: default 30% "storage reserved" + 3 replicas
# makes the UI look full (high "allocated") while "usage" stays low (thin volumes).
# We lower reserved % and use 2 replicas + replica auto-balance to stretch capacity.
# Existing volumes keep their replica count until you change them in the Longhorn UI.

persistence:
  defaultClassReplicaCount: 2

preUpgradeChecker:
  # Required for Argo CD / GitOps (chart README).
  jobEnabled: false
  upgradeVersionCheck: false

extraObjects:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: longhorn-system
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged

httproute:
  enabled: true
  hostnames:
    - longhorn.veliz.cc
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https

# managerUrl must be reachable from inside the cluster (CSI driver, volume mounts).
# Public UI stays on https://longhorn.veliz.cc via httproute above.
defaultSettings:
  managerUrl: http://longhorn-backend.longhorn-system.svc.cluster.local:9500
  defaultReplicaCount: "2"
  # Default chart ~30% per disk is large on 120 GB SSDs; frees schedulable space for replicas.
  # Raise if rebuilds fail under load (see Longhorn docs).
  storageReservedPercentageForDefaultDisk: "15"
  replicaAutoBalance: best-effort
