controllers:
  bazarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/bazarr
          # GHCR has no `latest`; use `rolling` or pin a semver (e.g. 1.5.6).
          tag: 1.5.6
        env:
          TZ: America/New_York
          # home-operations entrypoint: `--port ${BAZARR__PORT}` (see containers/apps/bazarr)
          BAZARR__PORT: &port 80
          # Bazarr reads settings via Dynaconf — env overrides use DYNACONF_<section>__<key>
          # (double underscore for nesting). See https://www.dynaconf.com/environment_variables/
          #
          # general.base_url is only a *path* prefix (e.g. /bazarr), never https://…
          # If config.yaml ever had a full URL, base_url_slash_cleaner turns https:// into https:/ and breaks Flask.
          # Force root: "/" → rstrip("/") is "" for URL prefixes (overrides bad PVC value).
          DYNACONF_GENERAL__BASE_URL: "/"
          DYNACONF_AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: BAZARR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              initialDelaySeconds: 90
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 768Mi
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  # Same NFS export as Sonarr/Radarr. If mounts fail with "access denied by server", allow NFS clients for your nodes on the UNAS.
  media:
    enabled: true
    type: nfs
    server: 10.0.20.10
    path: /volume/06037eaa-69f3-455a-ba49-735e4dcbcc7e/.srv/.unifi-drive/Media/.data
    globalMounts:
      - path: /media
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - bazarr.veliz.cc
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
