# 1Password item: node-red-secrets (Homelab vault)
# Fields (concealed unless noted):
#   GITHUB_TOKEN              — fine-grained PAT, repo Super-Node-RED, Contents: Read and write
#   NODE_RED_CREDENTIAL_SECRET — same as Proxmox Node-RED credentialSecret (decrypts flows_cred.json)
#
# If ExternalSecret stays OutOfSync, open each field in 1Password → Copy Secret Reference and
# compare path segments to remoteRef.key below.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: node-red-secrets
  namespace: home
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: node-red-secrets
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: node-red-secrets/GITHUB_TOKEN
    - secretKey: NODE_RED_CREDENTIAL_SECRET
      remoteRef:
        key: node-red-secrets/NODE_RED_CREDENTIAL_SECRET
