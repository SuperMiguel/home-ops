      settings.yaml: |
        ---
        # For configuration options and examples, please see:
        # https://gethomepage.dev/latest/configs/settings

        title: Super Homepage
        color: stone
        base: https://home.veliz.cc
        target: _blank
        fiveColumns: true

        layout:
            Proxmox Cluster:
              style: row
              columns: 7
            Infrastructure:
              style: column
            Media:
              style: row
              columns: 4
            Home Automation:
              style: column


        # providers:
        #   openweathermap: openweathermapapikey
        #   weatherapi: weatherapiapikey
      widgets.yaml: "---\n# For configuration options and examples, please see:\n# https://gethomepage.dev/latest/configs/service-widgets\n\n- search:\n    provider: duckduckgo\n    target: _blank\n\n- datetime:\n    format:\n      dateStyle: short\n      timeStyle: short\n      hour12: true\n\n- openmeteo:\n    label: SuperHome \n    latitude: 0.000000\n    longitude: 0.000000\n    units: imperial\n    cache: 30 # Time in minutes to cache API responses, to stay within limits"
      bookmarks.yaml: |
        ---
        # For configuration options and examples, please see:
        # https://gethomepage.dev/latest/configs/bookmarks

        - Developer:
            - Github:
                - abbr: GH
                  href: https://github.com/

        - Social:
            - Reddit:
                - abbr: RE
                  href: https://reddit.com/

        - Entertainment:
            - YouTube:
                - abbr: YT
                  href: https://youtube.com/
persistence:
  config-workspace:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config
  services:
    type: configMap
    identifier: services
    globalMounts:
      - path: /app/config/services.yaml
        subPath: services.yaml
      - path: /app/config/settings.yaml
        subPath: settings.yaml
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
route:
  app:
    hostnames:
      - home.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 3000
extraObjects:
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: homepage-secrets
      namespace: default
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword
      target:
        name: homepage-secrets
        creationPolicy: Owner
      data:
        - secretKey: PROXMOX_API_PASSWORD
          remoteRef:
            key: homepage-secrets/PROXMOX_API_PASSWORD
        - secretKey: UNIFI_USERNAME
          remoteRef:
            key: homepage-secrets/UNIFI_USERNAME
        - secretKey: UNIFI_PASSWORD
          remoteRef:
            key: homepage-secrets/UNIFI_PASSWORD
        - secretKey: HOMEBRIDGE_PASSWORD
          remoteRef:
            key: homepage-secrets/HOMEBRIDGE_PASSWORD
