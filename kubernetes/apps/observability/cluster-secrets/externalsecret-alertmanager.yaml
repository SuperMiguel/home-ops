# Alertmanager → Pushover: shared user key + dedicated Pushover application API token.
# In 1Password (Homelab / media-arr-api): add PUSHOVER_APP_KEY_ALERTMANAGER (create an "Alertmanager" app at pushover.net).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: alertmanager-secret
    creationPolicy: Owner
  data:
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: media-arr-api/PUSHOVER_USER_KEY
    - secretKey: ALERTMANAGER_PUSHOVER_TOKEN
      remoteRef:
        key: media-arr-api/PUSHOVER_APP_KEY_ALERTMANAGER
