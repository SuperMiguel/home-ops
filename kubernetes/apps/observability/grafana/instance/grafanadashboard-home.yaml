            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "mergeValues": true,
            "rowHeight": 0.9,
            "showValue": "never",
            "tooltip": {
              "mode": "single"
            }
          },
          "title": "Domain health over time",
          "type": "state-timeline",
          "targets": [
            {
              "expr": "(sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) == bool count(kube_node_info))",
              "legendFormat": "Cluster",
              "refId": "A"
            },
            {
              "expr": "(avg(gatus_results_endpoint_success{group=~\"core|observability|storage|home|media\"}) == bool 1)",
              "legendFormat": "Services",
              "refId": "B"
            },
            {
              "expr": "((count(argocd_app_info{health_status!=\"Healthy\"}) or vector(0)) + (count(argocd_app_info{sync_status!=\"Synced\"}) or vector(0))) == bool 0",
              "legendFormat": "GitOps",
              "refId": "C"
            },
            {
              "expr": "((count(longhorn_volume_robustness{state=\"degraded\"} == 1) or vector(0)) + (count(longhorn_volume_robustness{state=\"faulted\"} == 1) or vector(0)) + (count(kube_persistentvolumeclaim_status_phase{phase=\"Pending\"} == 1) or vector(0))) == bool 0",
              "legendFormat": "Storage",
              "refId": "D"
            },
            {
              "expr": "((max(100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)) > bool 85) or (max(100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > bool 85) or (max(100 - ((node_filesystem_avail_bytes{mountpoint=\"/var\",fstype=\"xfs\"} * 100) / node_filesystem_size_bytes{mountpoint=\"/var\",fstype=\"xfs\"})) > bool 85))",
              "legendFormat": "Saturation",
              "refId": "E"
            },
            {
              "expr": "(count(ALERTS{alertstate=\"firing\",alertname!~\"Watchdog|InfoInhibitor\"}) or vector(0)) == bool 0",
              "legendFormat": "No alerts",
              "refId": "F"
            }
          ]
        },
