# Gatus — https://github.com/TwiN/gatus
# Pushover: alerting in config.yaml; tokens from Secret gatus-secret (see cluster-secrets).
# Docs: https://gatus.io/docs/alerting-pushover
#
# Internal ICMP targets: from Super-Veliz-Network network/network-inventory.md (infra only; no
# phones/laptops/TVs/tablets/Sonos/consoles/streamers). NET_RAW is required for icmp:// from a non-root user.
# Ensure the cluster can route to 10.0.0.0/8, 192.168.120.0/24, 192.168.130.0/24 as needed.
controllers:
  gatus:
    # RWO PVC (/data sqlite): RollingUpdate can briefly run two pods on different nodes → second stuck ContainerCreating.
    strategy: Recreate
    pod:
      annotations:
        configmap.reloader.stakater.com/reload: gatus
        secret.reloader.stakater.com/reload: gatus-secret
    containers:
      app:
        image:
          repository: twinproduction/gatus
          tag: v5.34.0
        env:
          TZ: America/New_York
          GATUS_CONFIG_PATH: /config/config.yaml
        envFrom:
          - secretRef:
              name: gatus-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 20
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            add:
              - NET_RAW
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
          limits:
            memory: 256Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
service:
  app:
    ports:
      http:
        port: 8080
configMaps:
  config:
    data:
      config.yaml: |
        storage:
          type: sqlite
          path: /data/sqlite.db
        ui:
          title: Status
          header: Veliz
        alerting:
          pushover:
            application-token: "${PUSHOVER_APP_KEY_GATUS}"
            user-key: "${PUSHOVER_USER_KEY}"
            title: "Gatus"
            default-alert:
              failure-threshold: 3
              success-threshold: 2
              send-on-resolved: true
        # Anchor for DRY endpoints; not a Gatus key — see https://github.com/TwiN/gatus#keeping-your-configuration-small
        default-endpoint: &defaults
          interval: 5m
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: pushover
              description: "endpoint unhealthy"
        lan-icmp: &lan-icmp
          interval: 5m
          conditions:
            - "[CONNECTED] == true"
          alerts:
            - type: pushover
              description: "host unreachable"
        endpoints:
          - name: home
            <<: *defaults
            group: core
            url: https://home.veliz.cc
          - name: argo
            <<: *defaults
            group: core
            url: https://argo.veliz.cc
          - name: prowlarr
            <<: *defaults
            group: media
            url: https://prowlarr.veliz.cc
          - name: sonarr
            <<: *defaults
            group: media
            url: https://sonarr.veliz.cc
          - name: radarr
            <<: *defaults
            group: media
            url: https://radarr.veliz.cc
          - name: sabnzbd
            <<: *defaults
            group: media
            url: https://sabnzbd.veliz.cc
          - name: seerr
            <<: *defaults
            group: media
            url: https://seerr.veliz.cc
          - name: agregarr
            <<: *defaults
            group: media
            url: https://agregarr.veliz.cc
          - name: autobrr
            <<: *defaults
            group: media
            url: https://autobrr.veliz.cc
          - name: notifier
            <<: *defaults
            group: media
            url: https://notifier.veliz.cc
          - name: deduparr
            <<: *defaults
            group: media
            # Deduparr has no HTML UI; `/` is often 404. Health endpoint matches Deployment probes.
            url: https://deduparr.veliz.cc/health/ready
          - name: bazarr
