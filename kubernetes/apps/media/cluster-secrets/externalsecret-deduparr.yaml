---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deduparr-secret
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: deduparr-secret
    creationPolicy: Owner
  data:
    - secretKey: DEDUPARR_RADARR_MOVIES_API_KEY
      remoteRef:
        key: homelab-media-api-keys/RADARR_API_KEY
    - secretKey: DEDUPARR_SONARR_SERIES_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SONARR_API_KEY
