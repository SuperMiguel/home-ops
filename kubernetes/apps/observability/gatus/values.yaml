persistence:
  config:
    type: configMap
    identifier: config
    globalMounts:
      - path: /config/config.yaml
        subPath: config.yaml
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: longhorn
    globalMounts:
      - path: /data
route:
  app:
    hostnames:
      - gatus.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 8080
