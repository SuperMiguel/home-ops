# Allow the tuppr controller (namespace system-upgrade) to call the Talos machine API.
# Required by https://github.com/home-operations/tuppr — apply with talos:apply / regenerate configs.
machine:
  features:
    kubernetesTalosAPIAccess:
      enabled: true
      allowedKubernetesNamespaces:
        - system-upgrade
      allowedRoles:
        - os:admin
