apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-secrets
    creationPolicy: Owner
  data:
    - secretKey: PROXMOX_API_PASSWORD
      remoteRef:
        key: homepage-secrets/PROXMOX_API_PASSWORD
    - secretKey: UNIFI_USERNAME
      remoteRef:
        key: homepage-secrets/UNIFI_USERNAME
    - secretKey: UNIFI_PASSWORD
      remoteRef:
        key: homepage-secrets/UNIFI_PASSWORD
    - secretKey: HOMEBRIDGE_PASSWORD
      remoteRef:
        key: homepage-secrets/HOMEBRIDGE_PASSWORD
    # Same 1Password paths as media namespace Secret media-arr-api (pods cannot reference cross-namespace secrets).
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: media-arr-api/SONARR_API_KEY
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: media-arr-api/RADARR_API_KEY
    - secretKey: PROWLARR_API_KEY
      remoteRef:
        key: media-arr-api/PROWLARR_API_KEY
    - secretKey: SABNZBD_API_KEY
      remoteRef:
        key: media-arr-api/SABNZBD_API_KEY
    - secretKey: TAUTULLI_API_KEY
      remoteRef:
        key: media-arr-api/TAUTULLI_API_KEY
    - secretKey: OVERSEERR_API_KEY
      remoteRef:
        key: media-arr-api/OVERSEERR_API_KEY
