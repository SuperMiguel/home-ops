# Syncs 1Password item "media-arr-api" (vault: Homelab) → Secret media-arr-api.
# Concealed fields: SONARR_API_KEY, RADARR_API_KEY, PROWLARR_API_KEY,
# SABNZBD_API_KEY, SABNZBD_SERVER_USERNAME, SABNZBD_SERVER_PASSWORD,
# NEWZNAB_API_KEY (NZBgeek API key for Prowlarr Newznab indexer),
# TAUTULLI_API_KEY, BAZARR_API_KEY, SEERR_API_KEY, AUTOBRR_SESSION_SECRET,
# PUSHOVER_USER_KEY, PUSHOVER_APP_KEY (Buildarr).
# Notifier uses separate fields on the same item (not in this Secret): PUSHOVER_APP_KEY_RADARR,
# PUSHOVER_APP_KEY_SONARR, PUSHOVER_APP_KEY_SEERR — see externalsecret-notifier.yaml.
# If sync fails, open each field in 1Password → Copy Secret Reference and compare path segments.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: media-arr-api
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: media-arr-api
    creationPolicy: Owner
  data:
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: media-arr-api/SONARR_API_KEY
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: media-arr-api/RADARR_API_KEY
    - secretKey: PROWLARR_API_KEY
      remoteRef:
        key: media-arr-api/PROWLARR_API_KEY
    - secretKey: SABNZBD_API_KEY
      remoteRef:
        key: media-arr-api/SABNZBD_API_KEY
    - secretKey: SABNZBD_SERVER_USERNAME
      remoteRef:
        key: media-arr-api/SABNZBD_SERVER_USERNAME
    - secretKey: SABNZBD_SERVER_PASSWORD
      remoteRef:
        key: media-arr-api/SABNZBD_SERVER_PASSWORD
    - secretKey: NEWZNAB_API_KEY
      remoteRef:
        key: media-arr-api/NEWZNAB_API_KEY
    - secretKey: TAUTULLI_API_KEY
      remoteRef:
        key: media-arr-api/TAUTULLI_API_KEY
    - secretKey: BAZARR_API_KEY
      remoteRef:
        key: media-arr-api/BAZARR_API_KEY
    - secretKey: SEERR_API_KEY
      remoteRef:
        key: media-arr-api/SEERR_API_KEY
    - secretKey: AUTOBRR_SESSION_SECRET
      remoteRef:
        key: media-arr-api/AUTOBRR_SESSION_SECRET
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: media-arr-api/PUSHOVER_USER_KEY
    - secretKey: PUSHOVER_APP_KEY
      remoteRef:
        key: media-arr-api/PUSHOVER_APP_KEY
