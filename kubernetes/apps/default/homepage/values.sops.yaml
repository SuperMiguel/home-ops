controllers:
  homepage:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.1.0
        env:
          HOMEPAGE_ALLOWED_HOSTS: home.veliz.cc
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
service:
  app:
    ports:
      http:
        port: 3000
configMaps:
  services:
    data:
      services.yaml: ENC[AES256_GCM,data:,iv:V0I6d/b1VjRwKZ53R77Js8ul4GR6i1jnG/+C9to3vyA=,tag:n1HSlJxlypRTurwI72d1Gw==,type:str]
      settings.yaml: ENC[AES256_GCM,data:,iv:9vd7qwRV0nhigEf6ClCTrpcAKnkoHwH9rj4p6NP4/8Q=,tag:fP/LsMMx0Pp9gkdeiqHUMw==,type:str]
      widgets.yaml: ENC[AES256_GCM,data:,iv:Poc39oBcyYpBk4NPLKMR+fl7WWYxS8eM5QS8eynDBQE=,tag:XWvSp0KAgKitqUktpeTxLQ==,type:str]
      bookmarks.yaml: ENC[AES256_GCM,data:,iv:Dc9nKwvGAKg20u4IsSxQLJXRYl/FxcO5pACdQXiqpRs=,tag:+5iXyPazMqaD839txPXoUg==,type:str]
persistence:
  config-workspace:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config
  services:
    type: configMap
    identifier: services
    globalMounts:
      - path: /app/config/services.yaml
        subPath: services.yaml
      - path: /app/config/settings.yaml
        subPath: settings.yaml
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
route:
  app:
    hostnames:
      - home.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 3000
