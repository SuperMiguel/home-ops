# Seasonpackarr — https://github.com/nuxencs/seasonpackarr
# qBittorrent: set SEASONPACKARR__CLIENTS_DEFAULT_HOST/PORT to match your client Web UI/API.
# PREIMPORTPATH must exist on the media volume (adjust to your qBittorrent “complete” path).
controllers:
  seasonpackerr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/nuxencs/seasonpackarr
          tag: v0.14.0
        env:
          TZ: America/New_York
          SEASONPACKARR__DISABLE_CONFIG_FILE: "true"
          SEASONPACKARR__HOST: 0.0.0.0
          SEASONPACKARR__PORT: &port 80
          SEASONPACKARR__LOG_LEVEL: INFO
          SEASONPACKARR__SMART_MODE: "true"
          SEASONPACKARR__SMART_MODE_THRESHOLD: "0.75"
          SEASONPACKARR__PARSE_TORRENT_FILE: "true"
          SEASONPACKARR__FUZZY_MATCHING_SKIP_REPACK_COMPARE: "true"
          SEASONPACKARR__CLIENTS_DEFAULT_HOST: qbittorrent.media.svc.cluster.local
          SEASONPACKARR__CLIENTS_DEFAULT_PORT: "8080"
          SEASONPACKARR__CLIENTS_DEFAULT_PREIMPORTPATH: /media/Downloads/qbittorrent/complete/sonarr
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz/readiness
                port: *port
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz/readiness
                port: *port
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz/readiness
                port: *port
              failureThreshold: 30
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 256Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
persistence:
  media:
    enabled: true
    type: nfs
    server: 10.0.20.10
    path: /volume/06037eaa-69f3-455a-ba49-735e4dcbcc7e/.srv/.unifi-drive/Media/.data
    globalMounts:
      - path: /media
  tmp:
    type: emptyDir
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - seasonpackerr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
