controllers:
  radarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/radarr
          tag: 6.0.4.10291-ls295
        env:
          TZ: America/New_York
          PUID: "1000"
          PGID: "1000"
          # https://wiki.servarr.com/radarr/environment-variables — tighten later (Settings → General → Security).
          RADARR__AUTH__METHOD: "None"
          RADARR__AUTH__REQUIRED: "Disabled"
          RADARR__AUTH__ENABLED: "false"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 7878
              initialDelaySeconds: 90
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 7878
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
            add:
              - SETUID
              - SETGID
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 1Gi
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  # Library: direct NFS mount into the pod (UniFi / UNAS export).
  # If kubelet shows "access denied by server", allow NFS clients for your Talos nodes on the NAS (e.g. 10.0.20.32–34 or 10.0.20.0/24).
  media:
    enabled: true
    type: nfs
    server: 10.0.20.10
    path: /volume/06037eaa-69f3-455a-ba49-735e4dcbcc7e/.srv/.unifi-drive/Media/.data
    globalMounts:
      - path: /media
service:
  app:
    ports:
      http:
        port: 7878
route:
  app:
    hostnames:
      - radarr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 7878
