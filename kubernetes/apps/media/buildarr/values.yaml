# Buildarr — https://buildarr.github.io/
# Secrets: `media-arr-api` (1Password item media-arr-api) — see cluster-secrets/externalsecret.yaml.
# Non-secret endpoints for Prowlarr (SABnzbd host, Newznab base URL): edit env defaults on initContainer `copy-config` below.
# After changing Prowlarr resources, run a Buildarr job; if an indexer type fails validation, use
# `buildarr prowlarr dump-config http://prowlarr:80` against your old instance and align `type` / `fields`.
controllers:
  main:
    type: cronjob
    cronjob:
      schedule: "0 3 * * *"
      timeZone: America/New_York
      concurrencyPolicy: Forbid
      successfulJobsHistory: 1
      failedJobsHistory: 3
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      activeDeadlineSeconds: 7200
    pod:
      restartPolicy: OnFailure
    initContainers:
      copy-config:
        image:
          repository: docker.io/library/busybox
          tag: "1.36.1"
        command:
          - sh
          - -c
          - |
            set -e
            cp /cm/buildarr.yml /config/
            {
              echo "sonarr:"
              echo "  instances:"
              echo "    Sonarr:"
              echo "      api_key: ${SONARR_API_KEY}"
              echo "radarr:"
              echo "  instances:"
              echo "    Radarr:"
              echo "      api_key: ${RADARR_API_KEY}"
              echo "prowlarr:"
              echo "  api_key: ${PROWLARR_API_KEY}"
            } > /config/buildarr-secret.yml
            cat > /config/buildarr-runtime.yml <<EOF
            prowlarr:
              settings:
                download_clients:
                  delete_unmanaged: false
                  definitions:
                    SABnzbd:
                      type: sabnzbd
                      enable: true
                      host: ${SABNZBD_HOST}
                      port: ${SABNZBD_PORT}
                      use_ssl: false
                      category: prowlarr
                      api_key: ${SABNZBD_API_KEY}
                notifications:
                  delete_unmanaged: false
                  definitions:
                    Pushover:
                      type: pushover
                      notification_triggers:
                        on_health_issue: true
                        include_health_warnings: true
                        on_application_update: true
                      user_key: ${PUSHOVER_USER_KEY}
                      api_key: ${PUSHOVER_APP_KEY}
                indexers:
                  indexers:
                    delete_unmanaged: false
                    definitions:
                      NZBgeek:
                        type: newznab
                        enable: true
                        sync_profile: Standard
                        fields:
                          baseUrl: ${NEWZNAB_BASE_URL}
                          apiPath: /api
                          vipExpiration: "2027-01-17"
                        secret_fields:
                          apiKey: ${NEWZNAB_API_KEY}
            EOF
            chmod 644 /config/buildarr.yml /config/buildarr-secret.yml /config/buildarr-runtime.yml
        env:
          - name: SONARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SONARR_API_KEY
          - name: RADARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: RADARR_API_KEY
          - name: PROWLARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PROWLARR_API_KEY
          - name: SABNZBD_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SABNZBD_API_KEY
          - name: NEWZNAB_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: NEWZNAB_API_KEY
          - name: PUSHOVER_USER_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PUSHOVER_USER_KEY
          - name: PUSHOVER_APP_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PUSHOVER_APP_KEY
          - name: SABNZBD_HOST
            value: sabnzbd.lan
          - name: SABNZBD_PORT
            value: "8080"
          - name: NEWZNAB_BASE_URL
            value: "https://api.nzbgeek.info"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
    containers:
      app:
        image:
          repository: docker.io/callum027/buildarr
          tag: "0.7.8"
        # Skip ENTRYPOINT (/bootstrap.sh: pip + su-exec). `python3 -m buildarr` fails — the wheel has no __main__.py (see setuptools console_scripts: buildarr.cli.main:main).
        # Do NOT pip install radarr>=1.2 (pydantic v2 vs Buildarr’s pydantic v1). Fix Radarr colon replacement in UI if needed.
        command:
          - /bin/sh
          - -c
          - |
            exec python3 -c 'import sys; sys.argv = ["buildarr", "run", "/config/buildarr.yml"]; from buildarr.cli.main import main; main()'
        env:
          TZ: America/New_York
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    fsGroup: 1000
configMaps:
  buildarr-config:
    data:
      buildarr.yml: |
        ---

        includes:
          - buildarr-secret.yml
          - buildarr-runtime.yml

        sonarr:
          instances:
            Sonarr:
              hostname: sonarr.media.svc.cluster.local
              port: 80
              protocol: http

        radarr:
          instances:
            Radarr:
              hostname: radarr.media.svc.cluster.local
              port: 80
              protocol: http

        prowlarr:
          hostname: prowlarr.media.svc.cluster.local
          port: 80
          protocol: http
          settings:
            apps:
              sync_profiles:
                delete_unmanaged: false
                definitions:
                  Standard:
                    enable_rss: true
                    enable_automatic_search: true
                    enable_interactive_search: true
                    minimum_seeders: 1
              applications:
                delete_unmanaged: false
                definitions:
                  Radarr:
                    type: radarr
                    instance_name: Radarr
                    prowlarr_url: http://prowlarr.media.svc.cluster.local:80
                    base_url: http://radarr.media.svc.cluster.local:80
                    sync_level: full-sync
                  Sonarr:
                    type: sonarr
                    instance_name: Sonarr
                    prowlarr_url: http://prowlarr.media.svc.cluster.local:80
                    base_url: http://sonarr.media.svc.cluster.local:80
                    sync_level: full-sync
persistence:
  config:
    enabled: true
    type: emptyDir
    advancedMounts:
      main:
        copy-config:
          - path: /config
        app:
          - path: /config
  buildarr-yml:
    type: configMap
    identifier: buildarr-config
    advancedMounts:
      main:
        copy-config:
          - path: /cm/buildarr.yml
            subPath: buildarr.yml
            readOnly: true
