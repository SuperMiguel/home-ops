# Buildarr — https://buildarr.github.io/
# API keys: Secret `media-arr-api` (ExternalSecret syncs from 1Password item media-arr-api).
controllers:
  main:
    type: cronjob
    cronjob:
      schedule: "0 3 * * *"
      timeZone: America/New_York
      concurrencyPolicy: Forbid
      successfulJobsHistory: 1
      failedJobsHistory: 3
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      activeDeadlineSeconds: 7200
    pod:
      restartPolicy: OnFailure
    initContainers:
      copy-config:
        image:
          repository: docker.io/library/busybox
          tag: "1.36.1"
        command:
          - sh
          - -c
          - |
            set -e
            cp /cm/buildarr.yml /config/
            {
              echo "sonarr:"
              echo "  instances:"
              echo "    Sonarr:"
              echo "      api_key: ${SONARR_API_KEY}"
              echo "radarr:"
              echo "  instances:"
              echo "    Radarr:"
              echo "      api_key: ${RADARR_API_KEY}"
              echo "prowlarr:"
              echo "  api_key: ${PROWLARR_API_KEY}"
            } > /config/buildarr-secret.yml
            chmod 644 /config/buildarr.yml /config/buildarr-secret.yml
        env:
          - name: SONARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SONARR_API_KEY
          - name: RADARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: RADARR_API_KEY
          - name: PROWLARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PROWLARR_API_KEY
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
    containers:
      app:
        image:
          repository: docker.io/callum027/buildarr
          tag: "0.7.8"
        args:
          - run
          - /config/buildarr.yml
        env:
          TZ: America/New_York
          PUID: "1000"
          PGID: "1000"
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    fsGroup: 1000
configMaps:
  buildarr-config:
    data:
      buildarr.yml: |
        ---

        includes:
          - buildarr-secret.yml

        sonarr:
          instances:
            Sonarr:
              hostname: sonarr.media.svc.cluster.local
              port: 8989
              protocol: http

        radarr:
          instances:
            Radarr:
              hostname: radarr.media.svc.cluster.local
              port: 80
              protocol: http

        prowlarr:
          hostname: prowlarr.media.svc.cluster.local
          port: 9696
          protocol: http
          settings:
            apps:
              applications:
                delete_unmanaged: false
                definitions:
                  Radarr:
                    type: radarr
                    instance_name: Radarr
                    prowlarr_url: http://prowlarr.media.svc.cluster.local:9696
                    base_url: http://radarr.media.svc.cluster.local:80
                    sync_level: full-sync
                  Sonarr:
                    type: sonarr
                    instance_name: Sonarr
                    prowlarr_url: http://prowlarr.media.svc.cluster.local:9696
                    base_url: http://sonarr.media.svc.cluster.local:8989
                    sync_level: full-sync
persistence:
  config:
    enabled: true
    type: emptyDir
    advancedMounts:
      main:
        copy-config:
          - path: /config
        app:
          - path: /config
  buildarr-yml:
    type: configMap
    identifier: buildarr-config
    advancedMounts:
      main:
        copy-config:
          - path: /cm/buildarr.yml
            subPath: buildarr.yml
            readOnly: true
