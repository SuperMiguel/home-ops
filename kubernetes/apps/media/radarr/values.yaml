# API key: Secret media-arr-api (ExternalSecret → 1Password item media-arr-api, field RADARR_API_KEY).
# Pushover: PUSHOVER_USER_KEY + PUSHOVER_APP_KEY in the same secret; CronJob `arr-pushover-sync` applies Connect → Pushover on Radarr + Sonarr.
# Manual run: kubectl create job -n media radarr-arr-pushover-sync-manual --from=cronjob/radarr-arr-pushover-sync
# Prowlarr ↔ Radarr indexers (pick one):
# - Recommended: Prowlarr → Settings → Apps → Add Radarr — URL http://radarr.media.svc.cluster.local:80
#   and API key from Radarr → Settings → General → Security (Prowlarr syncs indexers into Radarr).
# - Or Radarr → Settings → Indexers → + → Prowlarr — Prowlarr URL http://prowlarr.media.svc.cluster.local:80
#   and API key from Prowlarr → Settings → General → Security.
controllers:
  radarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/radarr
          # GHCR has no `latest`; use `rolling` or pin a semver (e.g. 6.1.1.10317).
          tag: 6.1.1.10317
        env:
          TZ: America/New_York
          RADARR__APP__INSTANCENAME: Radarr
          RADARR__APP__THEME: dark
          RADARR__AUTH__METHOD: External
          RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
          RADARR__LOG__DBENABLED: "False"
          RADARR__LOG__LEVEL: info
          RADARR__SERVER__PORT: &port 80
          RADARR__UPDATE__BRANCH: develop
          RADARR__AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: RADARR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: *port
              initialDelaySeconds: 90
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: *port
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 1Gi
  # Idempotent: PUT/POST Radarr + Sonarr /api/v3/notification (Pushover) from media-arr-api keys.
  arr-pushover-sync:
    type: cronjob
    cronjob:
      schedule: "0 5 * * *"
      timeZone: America/New_York
      concurrencyPolicy: Forbid
      successfulJobsHistory: 1
      failedJobsHistory: 3
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      activeDeadlineSeconds: 900
    pod:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 0
        runAsGroup: 0
    containers:
      app:
        image:
          repository: docker.io/library/alpine
          tag: "3.20"
        command:
          - /bin/sh
          - -c
          - |
            set -eu
            apk add --no-cache curl jq >/dev/null

            NOTIFICATION_NAME="Pushover (GitOps)"
            OLD_WEBHOOK_NAME="Notifier (Pushover webhook)"
            RADARR_URL="${RADARR_URL:-http://radarr.media.svc.cluster.local:80}"
            SONARR_URL="${SONARR_URL:-http://sonarr.media.svc.cluster.local:80}"

            wait_ping() {
              url="$1"
              label="$2"
              code=""
              for _ in $(seq 1 90); do
                code=$(curl -sS -o /dev/null -w "%{http_code}" "${url}/ping" || true)
                if [ "$code" = "200" ]; then
                  echo "${label} ready."
                  return 0
                fi
                sleep 5
              done
              echo "${label} /ping not ready (last HTTP ${code})" >&2
              exit 1
            }

            delete_webhook() {
              base="$1"
              key="$2"
              curl -fsS "${base}/api/v3/notification" -H "X-Api-Key: ${key}" \
                | jq -r --arg n "$OLD_WEBHOOK_NAME" '.[] | select(.name == $n) | .id' \
                | while read -r nid; do
                    [ -z "$nid" ] && continue
                    curl -fsS -X DELETE "${base}/api/v3/notification/${nid}" \
                      -H "X-Api-Key: ${key}" >/dev/null
                    echo "${base}: deleted legacy webhook id=${nid}."
                  done
            }

            upsert_radarr() {
              id=$(curl -fsS "${RADARR_URL}/api/v3/notification" -H "X-Api-Key: ${RADARR_API_KEY}" \
                | jq -r --arg n "$NOTIFICATION_NAME" '.[] | select(.name == $n) | .id // empty' | head -1)
              if [ -n "$id" ]; then
                full=$(curl -fsS "${RADARR_URL}/api/v3/notification/${id}" -H "X-Api-Key: ${RADARR_API_KEY}")
                upd=$(echo "$full" | jq --arg uk "$PUSHOVER_USER_KEY" --arg ak "$PUSHOVER_APP_KEY" '
                  .fields |= map(
                    if ((.name // "") | ascii_downcase) == "userkey" then .value = $uk
                    elif ((.name // "") | ascii_downcase) == "apikey" then .value = $ak
                    else . end)
                  | .onGrab = true
                  | .onDownload = true
                  | .onUpgrade = true
                  | .onRename = false
                  | .onMovieAdded = false
                  | .onMovieDelete = false
                  | .onMovieFileDelete = false
                  | .onMovieFileDeleteForUpgrade = false
                  | .onHealthIssue = true
                  | .includeHealthWarnings = true
                  | .onHealthRestored = false
                  | .onApplicationUpdate = true
                  | .onManualInteractionRequired = true
                ')
                curl -fsS -X PUT "${RADARR_URL}/api/v3/notification/${id}" \
                  -H "X-Api-Key: ${RADARR_API_KEY}" -H "Content-Type: application/json" -d "$upd" >/dev/null
                echo "Radarr: updated Pushover id=${id}."
              else
                body=$(jq -n --arg uk "$PUSHOVER_USER_KEY" --arg ak "$PUSHOVER_APP_KEY" '
                  {
                    name: "Pushover (GitOps)",
                    implementation: "Pushover",
                    configContract: "PushoverSettings",
                    fields: [
                      {name: "apiKey", value: $ak},
                      {name: "userKey", value: $uk},
                      {name: "devices", value: ""},
                      {name: "priority", value: "0"},
                      {name: "retry", value: "0"},
                      {name: "expire", value: "0"},
                      {name: "ttl", value: "0"},
                      {name: "sound", value: ""}
                    ],
                    onGrab: true,
                    onDownload: true,
                    onUpgrade: true,
                    onRename: false,
                    onMovieAdded: false,
                    onMovieDelete: false,
                    onMovieFileDelete: false,
                    onMovieFileDeleteForUpgrade: false,
                    onHealthIssue: true,
                    includeHealthWarnings: true,
                    onHealthRestored: false,
                    onApplicationUpdate: true,
                    onManualInteractionRequired: true
                  }
                ')
                curl -fsS -X POST "${RADARR_URL}/api/v3/notification" \
                  -H "X-Api-Key: ${RADARR_API_KEY}" -H "Content-Type: application/json" -d "$body" >/dev/null
                echo "Radarr: created Pushover notification."
              fi
            }

            upsert_sonarr() {
              id=$(curl -fsS "${SONARR_URL}/api/v3/notification" -H "X-Api-Key: ${SONARR_API_KEY}" \
                | jq -r --arg n "$NOTIFICATION_NAME" '.[] | select(.name == $n) | .id // empty' | head -1)
              if [ -n "$id" ]; then
                full=$(curl -fsS "${SONARR_URL}/api/v3/notification/${id}" -H "X-Api-Key: ${SONARR_API_KEY}")
                upd=$(echo "$full" | jq --arg uk "$PUSHOVER_USER_KEY" --arg ak "$PUSHOVER_APP_KEY" '
                  .fields |= map(
                    if ((.name // "") | ascii_downcase) == "userkey" then .value = $uk
                    elif ((.name // "") | ascii_downcase) == "apikey" then .value = $ak
                    else . end)
                  | .onGrab = true
                  | .onDownload = true
                  | .onUpgrade = true
                  | .onImportComplete = false
                  | .onRename = false
                  | .onSeriesAdd = false
                  | .onSeriesDelete = false
                  | .onEpisodeFileDelete = false
                  | .onEpisodeFileDeleteForUpgrade = false
                  | .onHealthIssue = true
                  | .includeHealthWarnings = true
                  | .onHealthRestored = false
                  | .onApplicationUpdate = true
                  | .onManualInteractionRequired = true
                ')
                curl -fsS -X PUT "${SONARR_URL}/api/v3/notification/${id}" \
                  -H "X-Api-Key: ${SONARR_API_KEY}" -H "Content-Type: application/json" -d "$upd" >/dev/null
                echo "Sonarr: updated Pushover id=${id}."
              else
                body=$(jq -n --arg uk "$PUSHOVER_USER_KEY" --arg ak "$PUSHOVER_APP_KEY" '
                  {
                    name: "Pushover (GitOps)",
                    implementation: "Pushover",
                    configContract: "PushoverSettings",
                    fields: [
                      {name: "apiKey", value: $ak},
                      {name: "userKey", value: $uk},
                      {name: "devices", value: ""},
                      {name: "priority", value: "0"},
                      {name: "retry", value: "0"},
                      {name: "expire", value: "0"},
                      {name: "sound", value: ""}
                    ],
                    onGrab: true,
                    onDownload: true,
                    onUpgrade: true,
                    onImportComplete: false,
                    onRename: false,
                    onSeriesAdd: false,
                    onSeriesDelete: false,
                    onEpisodeFileDelete: false,
                    onEpisodeFileDeleteForUpgrade: false,
                    onHealthIssue: true,
                    includeHealthWarnings: true,
                    onHealthRestored: false,
                    onApplicationUpdate: true,
                    onManualInteractionRequired: true
                  }
                ')
                curl -fsS -X POST "${SONARR_URL}/api/v3/notification" \
                  -H "X-Api-Key: ${SONARR_API_KEY}" -H "Content-Type: application/json" -d "$body" >/dev/null
                echo "Sonarr: created Pushover notification."
              fi
            }

            wait_ping "$RADARR_URL" "Radarr"
            wait_ping "$SONARR_URL" "Sonarr"
            delete_webhook "$RADARR_URL" "$RADARR_API_KEY"
            delete_webhook "$SONARR_URL" "$SONARR_API_KEY"
            upsert_radarr
            upsert_sonarr
            echo "Done."
        env:
          - name: RADARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: RADARR_API_KEY
          - name: SONARR_API_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SONARR_API_KEY
          - name: PUSHOVER_USER_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PUSHOVER_USER_KEY
          - name: PUSHOVER_APP_KEY
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PUSHOVER_APP_KEY
          - name: RADARR_URL
            value: "http://radarr.media.svc.cluster.local:80"
          - name: SONARR_URL
            value: "http://sonarr.media.svc.cluster.local:80"
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  # Library: direct NFS mount into the pod (UniFi / UNAS export).
  # If kubelet shows "access denied by server", allow NFS clients for your Talos nodes on the NAS (e.g. 10.0.20.32–34 or 10.0.20.0/24).
  media:
    enabled: true
    type: nfs
    server: 10.0.20.10
    path: /volume/06037eaa-69f3-455a-ba49-735e4dcbcc7e/.srv/.unifi-drive/Media/.data
    globalMounts:
      - path: /media
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - radarr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
