# API key: Secret media-arr-api (ExternalSecret → 1Password homelab-media-api-keys/RADARR_API_KEY).
# Prowlarr ↔ Radarr indexers (pick one):
# - Recommended: Prowlarr → Settings → Apps → Add Radarr — URL http://radarr.media.svc.cluster.local:80
#   and API key from Radarr → Settings → General → Security (Prowlarr syncs indexers into Radarr).
# - Or Radarr → Settings → Indexers → + → Prowlarr — Prowlarr URL http://prowlarr.media.svc.cluster.local:80
#   and API key from Prowlarr → Settings → General → Security.
controllers:
  radarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/radarr
          # GHCR has no `latest`; use `rolling` or pin a semver (e.g. 6.1.1.10317).
          tag: 6.1.1.10317
        env:
          TZ: America/New_York
          RADARR__APP__INSTANCENAME: Radarr
          RADARR__APP__THEME: dark
          RADARR__AUTH__METHOD: External
          RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
          RADARR__LOG__DBENABLED: "False"
          RADARR__LOG__LEVEL: info
          RADARR__SERVER__PORT: &port 80
          RADARR__UPDATE__BRANCH: develop
          RADARR__AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: RADARR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: *port
              initialDelaySeconds: 90
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: *port
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 1Gi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  # Library: direct NFS mount into the pod (UniFi / UNAS export).
  # If kubelet shows "access denied by server", allow NFS clients for your Talos nodes on the NAS (e.g. 10.0.20.32–34 or 10.0.20.0/24).
  media:
    enabled: true
    type: nfs
    server: 10.0.20.10
    path: /volume/06037eaa-69f3-455a-ba49-735e4dcbcc7e/.srv/.unifi-drive/Media/.data
    globalMounts:
      - path: /media
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - radarr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
