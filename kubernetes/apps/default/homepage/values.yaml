controllers:
  homepage:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.1.0
        env:
          HOMEPAGE_ALLOWED_HOSTS: home.veliz.cc
          HOMEPAGE_VAR_PROXMOX_API_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: PROXMOX_API_PASSWORD
          HOMEPAGE_VAR_UNIFI_USERNAME:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: UNIFI_USERNAME
          HOMEPAGE_VAR_UNIFI_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: UNIFI_PASSWORD
          HOMEPAGE_VAR_HOMEBRIDGE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: HOMEBRIDGE_PASSWORD
          HOMEPAGE_VAR_SONARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SONARR_API_KEY
          HOMEPAGE_VAR_RADARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: RADARR_API_KEY
          HOMEPAGE_VAR_PROWLARR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PROWLARR_API_KEY
          HOMEPAGE_VAR_SABNZBD_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SABNZBD_API_KEY
          HOMEPAGE_VAR_TAUTULLI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: TAUTULLI_API_KEY
          HOMEPAGE_VAR_OVERSEERR_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: OVERSEERR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
service:
  app:
    ports:
      http:
        port: 3000
