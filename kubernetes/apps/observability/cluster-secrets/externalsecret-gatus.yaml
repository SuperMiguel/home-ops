# Gatus Pushover: shared user key + dedicated Pushover application API token.
# Add media-arr-api/PUSHOVER_APP_KEY_GATUS on the Homelab item (create a "Gatus" app at pushover.net).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus-secret
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gatus-secret
    creationPolicy: Owner
  data:
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: media-arr-api/PUSHOVER_USER_KEY
    - secretKey: PUSHOVER_APP_KEY_GATUS
      remoteRef:
        key: media-arr-api/PUSHOVER_APP_KEY_GATUS
