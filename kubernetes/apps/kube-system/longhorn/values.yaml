# Longhorn Helm chart (see kubernetes/argo/apps/kube-system/longhorn.yaml).
# Replica count 2: less SSD use per volume vs 3 (logical size × replica count on disk).

preUpgradeChecker:
  # Required for Argo CD / GitOps (chart README).
  jobEnabled: false
  upgradeVersionCheck: false

extraObjects:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: longhorn-system
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged

httproute:
  enabled: true
  hostnames:
    - longhorn.veliz.cc
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https

# So Manager API / UI links use the public hostname (not in-cluster IPs).
defaultSettings:
  managerUrl: https://longhorn.veliz.cc
  defaultReplicaCount: "2"
