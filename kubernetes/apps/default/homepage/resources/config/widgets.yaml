---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/service-widgets

- search:
    provider: duckduckgo
    target: _blank

- datetime:
    format:
      dateStyle: short
      timeStyle: short
      hour12: true

- openmeteo:
    label: SuperHome
    latitude: {{HOMEPAGE_VAR_OPENMETEO_LATITUDE}}
    longitude: {{HOMEPAGE_VAR_OPENMETEO_LONGITUDE}}
    units: imperial
    cache: 30 # Time in minutes to cache API responses, to stay within limits
