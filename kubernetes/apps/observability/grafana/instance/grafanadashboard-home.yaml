# Veliz Home — SRE overall-health dashboard. Open: https://grafana.veliz.cc/d/veliz-home
# Layout inspired by SRE dashboard hierarchy (status → golden signals → problems → resources → dependencies)
# and homelab NOC / command-center overview patterns.
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: veliz-home
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: Home
  uid: veliz-home
  json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "SRE home board for Veliz. Answers: is anything broken, golden signals (traffic/errors/latency/saturation), what is failing, and capacity headroom. Drill-downs: https://gatus.veliz.cc \u00b7 https://argo.veliz.cc \u00b7 https://longhorn.veliz.cc \u00b7 https://alertmanager.veliz.cc",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [
        {
          "title": "Gatus",
          "type": "link",
          "url": "https://gatus.veliz.cc",
          "targetBlank": true,
          "icon": "heart"
        },
        {
          "title": "Argo CD",
          "type": "link",
          "url": "https://argo.veliz.cc",
          "targetBlank": true,
          "icon": "cloud"
        },
        {
          "title": "Longhorn",
          "type": "link",
          "url": "https://longhorn.veliz.cc",
          "targetBlank": true,
          "icon": "database"
        },
        {
          "title": "Alertmanager",
          "type": "link",
          "url": "https://alertmanager.veliz.cc",
          "targetBlank": true,
          "icon": "bell"
        },
        {
          "title": "Prometheus",
          "type": "link",
          "url": "https://prometheus.veliz.cc",
          "targetBlank": true,
          "icon": "bolt"
        }
      ],
      "panels": [
        {
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 99,
          "options": {
            "code": {
              "language": "plaintext",
              "showLineNumbers": false,
              "showMiniMap": false
            },
            "content": "### Veliz Home \u2014 SRE health board\n**Questions this answers:** (1) Is anything broken? (2) How busy / slow / error-prone is the lab? (3) Are we close to capacity? (4) What exactly is failing?\n\n**How to use:** Top row = traffic lights (readable from across the room). Next = Google SRE **golden signals**. Then **only problems**. Empty problem tables = healthy. Detail rows below are for drill-down.\nInspired by SRE dashboard hierarchy (status \u2192 golden signals \u2192 resources \u2192 dependencies) and homelab NOC \u201ccommand center\u201d layouts.",
            "mode": "markdown"
          },
          "title": "",
          "transparent": true,
          "type": "text"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 3
          },
          "id": 100,
          "title": "1 \u00b7 Status \u2014 is anything broken?",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "none",
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 0,
                      "text": "FAIL"
                    },
                    "1": {
                      "color": "green",
                      "index": 1,
                      "text": "OK"
                    }
                  },
                  "type": "value"
                }
              ]
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 0,
            "y": 4
          },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "EVERYTHING OK?",
          "type": "stat",
          "targets": [
            {
              "expr": "(((sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) == bool count(kube_node_info))) * ((avg(gatus_results_endpoint_success{group=~\"core|observability|storage|home|media\"}) == bool 1)) * (((count(argocd_app_info{health_status!=\"Healthy\"}) or vector(0)) + (count(argocd_app_info{sync_status!=\"Synced\"}) or vector(0))) == bool 0) * (((count(longhorn_volume_robustness{state=\"degraded\"} == 1) or vector(0)) + (count(longhorn_volume_robustness{state=\"faulted\"} == 1) or vector(0)) + (count(kube_persistentvolumeclaim_status_phase{phase=\"Pending\"} == 1) or vector(0))) == bool 0) * (1 - (((max(100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)) > bool 85) or (max(100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > bool 85) or (max(100 - ((node_filesystem_avail_bytes{mountpoint=\"/var\",fstype=\"xfs\"} * 100) / node_filesystem_size_bytes{mountpoint=\"/var\",fstype=\"xfs\"})) > bool 85)))) * ((count(ALERTS{alertstate=\"firing\",alertname!~\"Watchdog|InfoInhibitor\"}) or vector(0)) == bool 0))",
              "legendFormat": "overall",
              "refId": "A"
            }
          ],
          "description": "OK only if Cluster + User services + GitOps + Storage are OK, saturation is not HOT, and no firing alerts."
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "none",
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 0,
                      "text": "FAIL"
                    },
                    "1": {
                      "color": "green",
                      "index": 1,
                      "text": "OK"
                    }
                  },
                  "type": "value"
                }
              ]
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 3,
            "x": 4,
            "y": 4
          },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Cluster",
          "type": "stat",
          "targets": [
            {
              "expr": "(sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) == bool count(kube_node_info))",
              "legendFormat": "c",
              "refId": "A"
            }
          ],
          "description": "All nodes Ready"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "none",
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 0,
