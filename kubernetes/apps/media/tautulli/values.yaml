# linuxserver/s6: must start as root; PUID/PGID map app data ownership.
# Tag 2.15.3-ls163 is not published on lscr.io; use a real tag (verified: 2.16.1).
controllers:
  tautulli:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/tautulli
          tag: 2.16.1
        env:
          TZ: America/New_York
          PUID: "1000"
          PGID: "1000"
          # Public URL (Envoy terminates TLS). Maps to config HTTP_BASE_URL — see
          # https://github.com/Tautulli/Tautulli/blob/master/plexpy/config.py (TAUTULLI_* env overrides).
          TAUTULLI_HTTP_BASE_URL: https://tautulli.veliz.cc
          # Behind reverse proxy / TLS at the edge.
          TAUTULLI_HTTP_PROXY: "1"
          # Internal listen port stays 8181 (Service + probes); do not set TAUTULLI_HTTP_PORT: 80 unless
          # you change container/service ports to match.
          TAUTULLI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: TAUTULLI_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8181
              initialDelaySeconds: 45
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8181
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
            add:
              - SETUID
              - SETGID
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 768Mi
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
service:
  app:
    ports:
      http:
        port: 8181
route:
  app:
    hostnames:
      - tautulli.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 8181
