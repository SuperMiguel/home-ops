# Platform dashboards from grafana.com. Datasource name must match GrafanaDatasource `Prometheus`.
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: longhorn-monitoring
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: Prometheus
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/16888/revisions/11/download
