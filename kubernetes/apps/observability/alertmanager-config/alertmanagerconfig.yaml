# Global Alertmanager routing (referenced by kube-prometheus-stack alertmanagerSpec.alertmanagerConfiguration).
# Watchdog → blackhole: avoids Pushover spam without an external heartbeat URL (e.g. Buddy).
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
  namespace: observability
spec:
  route:
    receiver: pushover
    repeatInterval: 12h
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: blackhole
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      - receiver: pushover
        matchers:
          - name: severity
            value: critical
            matchType: =
        groupBy:
          - alertname
          - cluster
          - job
        groupInterval: 5m
        groupWait: 1m
        repeatInterval: 12h
  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: blackhole
    - name: pushover
      pushoverConfigs:
        - html: true
          message: |-
            {{- range .Alerts }}
            {{- if ne .Annotations.description "" }}
            {{ .Annotations.description }}
            {{- else if ne .Annotations.summary "" }}
            {{ .Annotations.summary }}
            {{- else if ne .Annotations.message "" }}
            {{ .Annotations.message }}
            {{- else }}
            Alert description not available
            {{- end }}
            {{- if gt (len .Labels.SortedPairs) 0 }}

            {{- range .Labels.SortedPairs }}
            {{ .Name }}: {{ .Value }}
            {{- end }}

            {{- end }}
            {{- end }}
          monospace: false
          priority: |-
            {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
          sendResolved: true
          sound: gamelan
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          ttl: 86400s
          token:
            name: alertmanager-secret
            key: ALERTMANAGER_PUSHOVER_TOKEN
          userKey:
            name: alertmanager-secret
            key: PUSHOVER_USER_KEY
          urlTitle: View in Alertmanager
