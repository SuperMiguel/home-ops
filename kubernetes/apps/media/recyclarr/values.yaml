# Recyclarr — https://recyclarr.dev/
# Nightly sync to Trash Guides custom formats. Tune `recyclarr.yml` to match your Sonarr/Radarr quality profile trash_ids.
# Secrets: recyclarr-secret (RADARR_API_KEY, SONARR_API_KEY from media-arr-api).
controllers:
  recyclarr:
    type: cronjob
    cronjob:
      schedule: "0 0 * * *"
      timeZone: America/New_York
      concurrencyPolicy: Forbid
      successfulJobsHistory: 1
      failedJobsHistory: 1
      ttlSecondsAfterFinished: 86400
      backoffLimit: 0
    pod:
      restartPolicy: Never
    containers:
      app:
        image:
          repository: ghcr.io/recyclarr/recyclarr
          tag: 8.5.1
        env:
          RECYCLARR_DATA_DIR: /tmp
          RECYCLARR_CONFIG_PATH: /config/recyclarr.yml
        envFrom:
          - secretRef:
              name: recyclarr-secret
        args:
          - sync
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
configMaps:
  recyclarr-config:
    data:
      recyclarr.yml: |
        ---
        # yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/refs/tags/v8.0.0/schemas/config-schema.json
        sonarr:
          series:
            base_url: http://sonarr.media.svc.cluster.local
            api_key: !env_var SONARR_API_KEY
            delete_old_custom_formats: true
            media_management:
              propers_and_repacks: do_not_prefer
            media_naming:
              episodes:
                anime: default
                daily: default
                rename: true
                standard: default
              season: default
              series: plex-imdb
            quality_definition:
              type: series
            quality_profiles:
              - trash_id: c4cadd6b35b95f62c3d47a408e53e2f7
                reset_unmatched_scores:
                  enabled: true
            custom_formats:
              - trash_ids:
                  - 5d9fd1b1e06cd8a475462f40214b7df6
                assign_scores_to:
                  - trash_id: c4cadd6b35b95f62c3d47a408e53e2f7
                    score: 100
              - trash_ids:
                  - 32b367365729d530ca1c124a0b180c64
                  - 82d40da2bc6923f41e14394075dd4b03
                  - e1a997ddb54e3ecbfe06341ad323c458
                  - 06d66ab109d4d2eddb2794d21526d140
                assign_scores_to:
                  - trash_id: c4cadd6b35b95f62c3d47a408e53e2f7
        radarr:
          movies:
            base_url: http://radarr.media.svc.cluster.local
            api_key: !env_var RADARR_API_KEY
            delete_old_custom_formats: true
            media_management:
              propers_and_repacks: do_not_prefer
            media_naming:
              folder: plex-imdb
              movie:
                rename: true
                standard: plex-imdb
            quality_definition:
              type: sqp-uhd
            quality_profiles:
              - trash_id: 5128baeb2b081b72126bc8482b2a86a0
                reset_unmatched_scores:
                  enabled: true
            custom_formats:
              - trash_ids:
                  - 957d0f44b592285f26449575e8b1167e
                  - b6832f586342ef70d9c128d40c07b872
                  - cc444569854e9de0b084ab2b8b1532b2
                  - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5
                  - 7357cf5161efbf8c4d5d0c30b4815ee2
                  - 5c44f52a8714fdd79bb4d98e2673be1f
                  - f537cf427b64c38c8e36298f657e4828
                assign_scores_to:
                  - trash_id: 5128baeb2b081b72126bc8482b2a86a0
persistence:
  recyclarr-yml:
    type: configMap
    identifier: recyclarr-config
    advancedMounts:
      recyclarr:
        app:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
            readOnly: true
  tmp:
    type: emptyDir
    advancedMounts:
      recyclarr:
        app:
          - path: /tmp
