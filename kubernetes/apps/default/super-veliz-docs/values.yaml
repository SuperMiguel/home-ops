controllers:
  super-veliz-docs:
    strategy: RollingUpdate
    replicas: 1
    containers:
      app:
        image:
          repository: ghcr.io/super-miguel/super-veliz-network
          tag: docs
          pullPolicy: Always
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 30
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 2
              periodSeconds: 10
              timeoutSeconds: 2
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          # nginx writes cache and pid files under /var/cache/nginx and /run
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
defaultPodOptions:
  imagePullSecrets:
    - name: ghcr-super-veliz-pull
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
service:
  app:
    ports:
      http:
        port: 8080
route:
  app:
    hostnames:
      - docs.veliz.cc
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 8080
