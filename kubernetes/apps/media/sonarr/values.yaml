# API key: Secret media-arr-api (ExternalSecret → 1Password item media-arr-api, field SONARR_API_KEY).
# If Sonarr already used another key, update that field in 1Password to match Settings → General → Security.
# Prowlarr → Settings → Apps → Add Sonarr: http://sonarr.media.svc.cluster.local:80 + API key.
controllers:
  sonarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/sonarr
          tag: 4.0.17.2952-ls305
        env:
          TZ: America/New_York
          PUID: "1000"
          PGID: "1000"
          SONARR__APP__INSTANCENAME: Sonarr
          SONARR__APP__THEME: dark
          SONARR__AUTH__METHOD: External
          SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
          SONARR__LOG__DBENABLED: "False"
          SONARR__LOG__LEVEL: info
          SONARR__SERVER__PORT: "80"
          SONARR__UPDATE__BRANCH: develop
          SONARR__AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SONARR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 80
              initialDelaySeconds: 90
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 80
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
            add:
              - SETUID
              - SETGID
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 1Gi
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  # Library: direct NFS mount into the pod (same export as Radarr).
  # If kubelet shows "access denied by server", allow NFS clients for your Talos nodes on the NAS (e.g. 10.0.20.32–34 or 10.0.20.0/24).
  media:
    enabled: true
    type: nfs
    server: 10.0.20.10
    path: /volume/06037eaa-69f3-455a-ba49-735e4dcbcc7e/.srv/.unifi-drive/Media/.data
    globalMounts:
      - path: /media
service:
  app:
    ports:
      http:
        port: 80
route:
  app:
    hostnames:
      - sonarr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 80
