# Image: ghcr.io/home-operations/tautulli — see https://github.com/home-operations/containers
controllers:
  tautulli:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/tautulli
          # GHCR has no `latest`; use `rolling` or pin a semver (e.g. 2.16.1).
          tag: 2.17.0
        env:
          TZ: America/New_York
          # Public URL (Envoy terminates TLS). See Tautulli config / TAUTULLI_* env overrides.
          TAUTULLI_HTTP_BASE_URL: https://tautulli.veliz.cc
          # Behind reverse proxy / TLS at the edge.
          TAUTULLI_HTTP_PROXY: "1"
          TAUTULLI_HTTP_PORT: &port 80
          TAUTULLI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: TAUTULLI_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /status
                port: *port
              initialDelaySeconds: 45
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /status
                port: *port
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 768Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - tautulli.veliz.cc
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
