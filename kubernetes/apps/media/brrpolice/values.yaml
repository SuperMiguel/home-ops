# Brrpolice — https://github.com/zariel/brrpolice
# Point BRRPOLICE_QBITTORRENT__BASE_URL at your qBittorrent Web UI when you run it in-cluster (or replace with your external URL).
# If qBittorrent is not deployed yet, the app may not become Ready until the URL is reachable.
controllers:
  brrpolice:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/zariel/brrpolice
          tag: v0.13.0
        env:
          BRRPOLICE_HTTP__PORT: &port 80
          BRRPOLICE_LOGGING__LEVEL: info
          BRRPOLICE_QBITTORRENT__BASE_URL: http://qbittorrent.media.svc.cluster.local:8080
          TZ: America/New_York
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *port
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *port
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: longhorn
    globalMounts:
      - path: /data
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - brrpolice.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
