    - HL-PVE-35:
        icon: proxmox.png
        ping: 10.0.20.35
        widget:
          type: proxmox
          url: https://10.0.20.35:8006
          username: api-homepage@pam!homepage
          password: {{HOMEPAGE_VAR_PROXMOX_API_PASSWORD}}
          node: HL-PVE-35
    - HL-PVE-36:
        icon: proxmox.png
