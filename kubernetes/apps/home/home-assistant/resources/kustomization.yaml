apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home

configMapGenerator:
  - name: home-assistant-config
    files:
      - config/configuration.yaml
  - name: home-assistant-packages
    files:
      - config/packages/mqtt.yaml
      - config/packages/lovelace.yaml
  - name: home-assistant-dashboards
    files:
      - config/dashboards/tablet.yaml

generatorOptions:
  disableNameSuffixHash: true
