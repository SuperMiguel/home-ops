# Grafana admin password for Grafana Operator instance (GF_SECURITY_ADMIN_PASSWORD).
# 1Password item homelab-grafana, field GRAFANA_ADMIN_PASSWORD.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-password
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-admin-password-secret
    creationPolicy: Owner
  data:
    - secretKey: GF_SECURITY_ADMIN_PASSWORD
      remoteRef:
        key: homelab-grafana/GRAFANA_ADMIN_PASSWORD
