# Kometa → Plex + TMDb. Add these fields on 1Password item `homelab-media-api-keys`:
#   PLEX_URL   — e.g. http://10.0.20.x:32400 (server LAN URL, not app.plex.tv)
#   PLEX_TOKEN — Plex XML API token (Settings → Account / plex.tv token for the admin user)
#   TMDB_API_KEY — https://www.themoviedb.org/settings/api (required by Kometa even for ops-only)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa-secret
  namespace: media
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kometa-secret
    creationPolicy: Owner
  data:
    - secretKey: KOMETA_PLEXURL
      remoteRef:
        key: homelab-media-api-keys/PLEX_URL
    - secretKey: KOMETA_PLEXTOKEN
      remoteRef:
        key: homelab-media-api-keys/PLEX_TOKEN
    - secretKey: KOMETA_TMDBKEY
      remoteRef:
        key: homelab-media-api-keys/TMDB_API_KEY
