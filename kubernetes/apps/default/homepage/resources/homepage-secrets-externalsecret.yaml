apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-secrets
    creationPolicy: Owner
  data:
    - secretKey: PROXMOX_API_PASSWORD
      remoteRef:
        key: homepage-secrets/PROXMOX_API_PASSWORD
    - secretKey: UNIFI_USERNAME
      remoteRef:
        key: homepage-secrets/UNIFI_USERNAME
    - secretKey: UNIFI_PASSWORD
      remoteRef:
        key: homepage-secrets/UNIFI_PASSWORD
    - secretKey: HOMEBRIDGE_PASSWORD
      remoteRef:
        key: homepage-secrets/HOMEBRIDGE_PASSWORD
