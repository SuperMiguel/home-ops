# Same keys as onedr0p’s recyclarr ExternalSecret (radarr/sonarr items); source: homelab-media-api-keys.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr-secret
  namespace: media
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: recyclarr-secret
    creationPolicy: Owner
  data:
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/RADARR_API_KEY
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SONARR_API_KEY
