controllers:
  homepage:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.1.0
        env:
          HOMEPAGE_ALLOWED_HOSTS: home.veliz.cc
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
service:
  app:
    ports:
      http:
        port: 3000
configMaps:
  services:
    data:
      services.yaml: ENC[AES256_GCM,data:,iv:J+0slvUtnEZfTe/ctM1coalSbRlm5KlYAvBfIfHXK58=,tag:LwW+0p9HuUNjHHb0vQeNlQ==,type:str]
      settings.yaml: ENC[AES256_GCM,data:,iv:dhLpEVAjwH0qgPJ+GqADw6i2aaaEncKai7w5BVap9lc=,tag:kenNRdzKJnLUgVvaRJsLJg==,type:str]
      widgets.yaml: ENC[AES256_GCM,data:,iv:VGhtaIbfuhX1r++Gg5OU/UWNEj6AIi3mffL0Qws8lXw=,tag:kB4xvfKyDnG/fz6A+GuCpw==,type:str]
      bookmarks.yaml: ENC[AES256_GCM,data:,iv:yAuIvLCGjmAPO9OYgzTBiLVsutNABAYXYezNeaS50pE=,tag:pDdRD6z09rLogSX6AnTA4w==,type:str]
persistence:
  config-workspace:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config
  services:
    type: configMap
    identifier: services
    globalMounts:
      - path: /app/config/services.yaml
        subPath: services.yaml
      - path: /app/config/settings.yaml
        subPath: settings.yaml
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
route:
  app:
    hostnames:
      - home.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 3000
