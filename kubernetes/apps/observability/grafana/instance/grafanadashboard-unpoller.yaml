# UniFi Poller — Prometheus dashboards (import from grafana.com). Datasource name must match GrafanaDatasource `Prometheus`.
# https://unpoller.com/docs/dependencies/grafana
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: unpoller-uap-insights
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: Prometheus
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/11314/revisions/10/download
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: unpoller-network-sites
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: Prometheus
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/11311/revisions/5/download
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: unpoller-clients
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: Prometheus
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/11315/revisions/9/download
