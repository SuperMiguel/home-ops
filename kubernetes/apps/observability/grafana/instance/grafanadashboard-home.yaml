              "values": false
            },
            "textMode": "auto"
          },
          "title": "Alerts",
          "type": "stat",
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\",alertname!~\"Watchdog|InfoInhibitor\"}) or vector(0)",
              "legendFormat": "a",
              "refId": "A"
            }
          ],
          "description": "Firing alerts (excl. Watchdog)"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "When did each domain flip? Green=OK. Capacity row uses inverted saturation (green=OK).",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "fillOpacity": 100,
                "lineWidth": 0
              },
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 0,
                      "text": "FAIL"
                    },
                    "1": {
                      "color": "green",
                      "index": 1,
                      "text": "OK"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Saturation"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "options": {
                          "0": {
                            "color": "green",
                            "index": 0,
                            "text": "OK"
                          },
                          "1": {
                            "color": "orange",
                            "index": 1,
                            "text": "HOT"
                          }
                        },
                        "type": "value"
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 5,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "id": 8,
          "options": {
