# API key: Secret media-arr-api (ExternalSecret → 1Password homelab-media-api-keys/SABNZBD_API_KEY).
# Prowlarr download client: http://sabnzbd.media.svc.cluster.local:80 + same API key.
controllers:
  sabnzbd:
    strategy: RollingUpdate
    initContainers:
      set-folders:
        image:
          repository: ghcr.io/home-operations/sabnzbd
          tag: rolling
        command:
          - /bin/sh
          - -c
          - |
            set -e
            if [ ! -f /config/sabnzbd.ini ]; then
              cp /defaults/sabnzbd.ini /config/sabnzbd.ini
            fi
            sed -i \
              -e 's|^download_dir *=.*$|download_dir = /media/Downloads/incomplete|g' \
              -e 's|^complete_dir *=.*$|complete_dir = /media/Downloads/complete|g' \
              /config/sabnzbd.ini
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/sabnzbd
          # GHCR has no `latest`; use `rolling` or pin a semver (e.g. 4.5.5).
          tag: rolling
        env:
          TZ: America/New_York
          SABNZBD__PORT: &port 80
          # Hostnames only (not URLs); entrypoint merges with pod HOSTNAME. See sabnzbd.org/wiki/extra/hostname-check
          SABNZBD__HOST_WHITELIST_ENTRIES: sabnzbd.veliz.cc
          SABNZBD__API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: SABNZBD_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 45
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
            # Sabnzbd spikes during PAR2 repair / unpacking; 1Gi limit caused repeated OOMKilled.
            memory: 2Gi
          limits:
            memory: 8Gi
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  # Same NFS export as Sonarr/Radarr (completed + incomplete under /media).
  media:
    enabled: true
    type: nfs
    server: 10.0.20.10
    path: /volume/06037eaa-69f3-455a-ba49-735e4dcbcc7e/.srv/.unifi-drive/Media/.data
    globalMounts:
      - path: /media
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - sabnzbd.veliz.cc
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
