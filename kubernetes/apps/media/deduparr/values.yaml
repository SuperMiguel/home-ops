# Deduparr — https://git.enoent.fr/kernald/deduparr
# API keys: secret deduparr-secret (same values as Radarr/Sonarr from media-arr-api).
# No browser dashboard: HTTP is for /health/ready (and metrics if enabled). Do not expect `https://deduparr…/` to render a page.
controllers:
  deduparr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: quay.io/kernald/deduparr
          tag: 1.2.0
        env:
          DEDUPARR_LOG_LEVEL: info
          DEDUPARR_RADARR_MOVIES_ENABLED: "true"
          DEDUPARR_RADARR_MOVIES_URL: http://radarr.media.svc.cluster.local
          DEDUPARR_REMOVE_FROM_CLIENT: "false"
          DEDUPARR_SCHEDULE: service
          DEDUPARR_SERVICE__INTERVAL: 2m
          DEDUPARR_SERVICE__PORT: &port 80
          DEDUPARR_SONARR_SERIES_ENABLED: "true"
          DEDUPARR_SONARR_SERIES_URL: http://sonarr.media.svc.cluster.local
          TZ: America/New_York
        envFrom:
          - secretRef:
              name: deduparr-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/ready
                port: *port
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/ready
                port: *port
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/ready
                port: *port
              failureThreshold: 30
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - deduparr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
