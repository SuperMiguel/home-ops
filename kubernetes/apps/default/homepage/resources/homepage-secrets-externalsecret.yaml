apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-secrets
    creationPolicy: Owner
  data:
    - secretKey: PROXMOX_API_PASSWORD
      remoteRef:
        key: homepage-secrets/PROXMOX_API_PASSWORD
    - secretKey: UNIFI_USERNAME
      remoteRef:
        key: homepage-secrets/UNIFI_USERNAME
    - secretKey: UNIFI_PASSWORD
      remoteRef:
        key: homepage-secrets/UNIFI_PASSWORD
    - secretKey: HOMEBRIDGE_PASSWORD
      remoteRef:
        key: homepage-secrets/HOMEBRIDGE_PASSWORD
    # Weather widget coordinates (approximate location — treat as sensitive).
    - secretKey: OPENMETEO_LATITUDE
      remoteRef:
        key: homepage-secrets/OPENMETEO_LATITUDE
    - secretKey: OPENMETEO_LONGITUDE
      remoteRef:
        key: homepage-secrets/OPENMETEO_LONGITUDE
    # homelab-media-api-keys (same values as media namespace Secret media-arr-api; pods cannot use cross-namespace secrets).
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SONARR_API_KEY
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/RADARR_API_KEY
    - secretKey: PROWLARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/PROWLARR_API_KEY
    - secretKey: SABNZBD_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SABNZBD_API_KEY
    - secretKey: TAUTULLI_API_KEY
      remoteRef:
        key: homelab-media-api-keys/TAUTULLI_API_KEY
    - secretKey: BAZARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/BAZARR_API_KEY
    - secretKey: SEERR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SEERR_API_KEY
