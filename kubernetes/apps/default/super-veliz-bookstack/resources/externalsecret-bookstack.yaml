# 1Password item "homelab-bookstack" with fields:
#   APP_KEY       — Laravel-style key (must start with base64:). Generate with either:
#                   docker run --rm --entrypoint /bin/bash lscr.io/linuxserver/bookstack:latest appkey
#                   (note: no `-c`; `appkey` is an argument to bash, not a shell command)
#                   or: python3 -c "import secrets,base64; print('base64:'+base64.b64encode(secrets.token_bytes(32)).decode())"
#   DB_PASSWORD   — used for MariaDB root + bookstack user and BookStack DB_PASS
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bookstack-secrets
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bookstack-secrets
    creationPolicy: Owner
  data:
    - secretKey: APP_KEY
      remoteRef:
        key: homelab-bookstack/APP_KEY
    - secretKey: DB_PASSWORD
      remoteRef:
        key: homelab-bookstack/DB_PASSWORD
