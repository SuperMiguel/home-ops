# Pushover: one user key + three Pushover "application" API keys (Radarr / Sonarr / Seerr).
# 1Password item homelab-pushover: PUSHOVER_USER_KEY, PUSHOVER_APP_KEY_RADARR, _SONARR, _SEERR.
# Buildarr uses homelab-pushover/PUSHOVER_APP_KEY via Secret media-arr-api (externalsecret.yaml).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notifier-secret
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: notifier-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        APPRISE_RADARR_PUSHOVER_URL: "pover://{{ .PUSHOVER_USER_KEY }}@{{ .PUSHOVER_APP_KEY_RADARR }}"
        APPRISE_SONARR_PUSHOVER_URL: "pover://{{ .PUSHOVER_USER_KEY }}@{{ .PUSHOVER_APP_KEY_SONARR }}"
        APPRISE_SEERR_PUSHOVER_URL: "pover://{{ .PUSHOVER_USER_KEY }}@{{ .PUSHOVER_APP_KEY_SEERR }}"
  data:
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: homelab-pushover/PUSHOVER_USER_KEY
    - secretKey: PUSHOVER_APP_KEY_RADARR
      remoteRef:
        key: homelab-pushover/PUSHOVER_APP_KEY_RADARR
    - secretKey: PUSHOVER_APP_KEY_SONARR
      remoteRef:
        key: homelab-pushover/PUSHOVER_APP_KEY_SONARR
    - secretKey: PUSHOVER_APP_KEY_SEERR
      remoteRef:
        key: homelab-pushover/PUSHOVER_APP_KEY_SEERR
