# linuxserver/s6: must start as root; PUID/PGID map app data ownership. Do not use runAsNonRoot + UID 1000.
controllers:
  prowlarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 1.37.0
        env:
          TZ: America/New_York
          PUID: "1000"
          PGID: "1000"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 9696
              initialDelaySeconds: 45
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 9696
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 768Mi
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
service:
  app:
    ports:
      http:
        port: 9696
route:
  app:
    hostnames:
      - prowlarr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 9696
