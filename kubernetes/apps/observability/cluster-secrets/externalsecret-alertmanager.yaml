# Alertmanager → Pushover: shared user key + dedicated Pushover application API token.
# 1Password homelab-pushover: PUSHOVER_USER_KEY, PUSHOVER_APP_KEY_ALERTMANAGER (Alertmanager app at pushover.net).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager
  namespace: observability
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: alertmanager-secret
    creationPolicy: Owner
  data:
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: homelab-pushover/PUSHOVER_USER_KEY
    - secretKey: ALERTMANAGER_PUSHOVER_TOKEN
      remoteRef:
        key: homelab-pushover/PUSHOVER_APP_KEY_ALERTMANAGER
