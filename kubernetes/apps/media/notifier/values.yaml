# Notifier — ghcr.io/home-operations/webhook (adnanh/webhook) + Apprise → Pushover.
# Based on https://github.com/onedr0p/home-ops/tree/main/kubernetes/apps/default/notifier
# Webhook URLs (HTTPS via Envoy): https://notifier.veliz.cc/hooks/{radarr-pushover,seerr-pushover,sonarr-pushover}
# Configure those in Radarr/Sonarr/Seerr → Connect/Webhooks. Secrets: notifier-secret (PUSHOVER_* from media-arr-api).
# Edit hook scripts under resources/ and mirror into configMaps below (Helm has no file include).
controllers:
  notifier:
    replicas: 1
    strategy: RollingUpdate
    pod:
      annotations:
        configmap.reloader.stakater.com/reload: notifier
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/webhook
          tag: 2.8.3@sha256:b5a6defe3462a7bba13342bb878b20504f3699644a442039dad21285edca0082
        env:
          WEBHOOK__PORT: &port 80
          TZ: America/New_York
        envFrom:
          - secretRef:
              name: notifier-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 10
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 5
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              failureThreshold: 30
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
service:
  app:
    ports:
      http:
        port: *port

configMaps:
  notifier-config:
    data:
      hooks.yaml: |
        ---
        - id: radarr-pushover
          execute-command: /config/radarr-pushover.sh
          pass-arguments-to-command:
            - source: entire-payload

        - id: seerr-pushover
          execute-command: /config/seerr-pushover.sh
          pass-arguments-to-command:
            - source: entire-payload

        - id: sonarr-pushover
          execute-command: /config/sonarr-pushover.sh
          pass-arguments-to-command:
            - source: entire-payload
      radarr-pushover.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Incoming arguments
        PAYLOAD=${1:-}

        # Required environment variables
        : "${APPRISE_RADARR_PUSHOVER_URL:?Pushover URL required}"

        echo "[DEBUG] Radarr Payload: ${PAYLOAD}"

        function _jq() {
            jq -r "${1:?}" <<<"${PAYLOAD}"
        }

        function notify() {
            local event_type=$(_jq '.eventType')

            case "${event_type}" in
                "Download")
                    printf -v PUSHOVER_TITLE "Movie %s" \
                        "$( [[ "$(_jq '.isUpgrade')" == "true" ]] && echo "Upgraded" || echo "Added" )"
                    printf -v PUSHOVER_MESSAGE "<b>%s (%s)</b><small>\n%s</small><small>\n\n<b>Client:</b> %s</small>" \
                        "$(_jq '.movie.title')" \
                        "$(_jq '.movie.year')" \
                        "$(_jq '.movie.overview')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/movie/%s" \
                        "$(_jq '.applicationUrl')" \
                        "$(_jq '.movie.tmdbId')"
                    printf -v PUSHOVER_URL_TITLE "View Movie"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                "ManualInteractionRequired")
                    printf -v PUSHOVER_TITLE "Movie Requires Manual Interaction"
                    printf -v PUSHOVER_MESSAGE "<b>%s (%s)</b><small>\n<b>Client:</b> %s</small>" \
                        "$(_jq '.movie.title')" \
                        "$(_jq '.movie.year')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/activity/queue" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Queue"
                    printf -v PUSHOVER_PRIORITY "high"
                    ;;
                "Test")
                    printf -v PUSHOVER_TITLE "Test Notification"
                    printf -v PUSHOVER_MESSAGE "Howdy this is a test notification"
                    printf -v PUSHOVER_URL "%s" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Movies"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                *)
                    echo "[ERROR] Unknown event type: ${event_type}" >&2
                    return 1
                    ;;
            esac

            apprise -vv --title "${PUSHOVER_TITLE}" --body "${PUSHOVER_MESSAGE}" --input-format html \
                "${APPRISE_RADARR_PUSHOVER_URL}?url=${PUSHOVER_URL}&url_title=${PUSHOVER_URL_TITLE}&priority=${PUSHOVER_PRIORITY}&format=html"
        }

        function main() {
            notify
        }

        main "$@"
      seerr-pushover.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Incoming arguments
        PAYLOAD=${1:-}

        # Required environment variables
        : "${APPRISE_SEERR_PUSHOVER_URL:?Pushover URL required}"

        echo "[DEBUG] Seerr Payload: ${PAYLOAD}"

        function _jq() {
            jq -r "${1:?}" <<<"${PAYLOAD}"
        }

        function notify() {
            local event_type=$(_jq '.notification_type')

            case "${event_type}" in
                "TEST_NOTIFICATION")
                    printf -v PUSHOVER_TITLE "Test Notification"
                    printf -v PUSHOVER_MESSAGE "Howdy this is a test notification from <b>%s</b>" "Seerr"
                    printf -v PUSHOVER_URL "%s" "https://seerr.veliz.cc"
                    printf -v PUSHOVER_URL_TITLE "Open %s" "Seerr"
                    printf -v PUSHOVER_PRIORITY "%s" "low"
                    ;;
                *)
                    echo "[ERROR] Unknown event type: ${event_type}" >&2
                    return 1
                    ;;
            esac

            apprise -vv --title "${PUSHOVER_TITLE}" --body "${PUSHOVER_MESSAGE}" --input-format html \
                "${APPRISE_SEERR_PUSHOVER_URL}?url=${PUSHOVER_URL}&url_title=${PUSHOVER_URL_TITLE}&priority=${PUSHOVER_PRIORITY}&format=html"
        }

        function main() {
            notify
        }

        main "$@"
      sonarr-pushover.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Incoming arguments
        PAYLOAD=${1:-}

        # Required environment variables
        : "${APPRISE_SONARR_PUSHOVER_URL:?Pushover URL required}"

        echo "[DEBUG] Sonarr Payload: ${PAYLOAD}"

        function _jq() {
            jq -r "${1:?}" <<<"${PAYLOAD}"
        }

        function notify() {
            local event_type=$(_jq '.eventType')

            case "${event_type}" in
                "Download")
                    printf -v PUSHOVER_TITLE \
                        "Episode %s" "$( [[ "$(_jq '.isUpgrade')" == "true" ]] && echo "Upgraded" || echo "Added" )"
                    printf -v PUSHOVER_MESSAGE "<b>%s (S%02dE%02d)</b><small>\n%s</small><small>\n\n<b>Client:</b> %s</small>" \
                        "$(_jq '.series.title')" \
                        "$(_jq '.episodes[0].seasonNumber')" \
                        "$(_jq '.episodes[0].episodeNumber')" \
                        "$(_jq '.episodes[0].title')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/series/%s" \
                        "$(_jq '.applicationUrl')" \
                        "$(_jq '.series.titleSlug')"
                    printf -v PUSHOVER_URL_TITLE "View Series"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                "ManualInteractionRequired")
                    printf -v PUSHOVER_TITLE "Episode Requires Manual Interaction"
                    printf -v PUSHOVER_MESSAGE "<b>%s</b><small>\n<b>Client:</b> %s</small>" \
                        "$(_jq '.series.title')" \
                        "$(_jq '.downloadClient')"
                    printf -v PUSHOVER_URL "%s/activity/queue" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Queue"
                    printf -v PUSHOVER_PRIORITY "high"
                    ;;
                "Test")
                    printf -v PUSHOVER_TITLE "Test Notification"
                    printf -v PUSHOVER_MESSAGE "Howdy this is a test notification"
                    printf -v PUSHOVER_URL "%s" "$(_jq '.applicationUrl')"
                    printf -v PUSHOVER_URL_TITLE "View Series"
                    printf -v PUSHOVER_PRIORITY "low"
                    ;;
                *)
                    echo "[ERROR] Unknown event type: ${event_type}" >&2
                    return 1
                    ;;
            esac

            apprise -vv --title "${PUSHOVER_TITLE}" --body "${PUSHOVER_MESSAGE}" --input-format html \
                "${APPRISE_SONARR_PUSHOVER_URL}?url=${PUSHOVER_URL}&url_title=${PUSHOVER_URL_TITLE}&priority=${PUSHOVER_PRIORITY}&format=html"
        }

        function main() {
            notify
        }

        main "$@"

persistence:
  config:
    type: configMap
    identifier: notifier-config
    defaultMode: 0775
    globalMounts:
      - path: /config
        readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
route:
  app:
    hostnames:
      - notifier.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
