- Kubernetes:
    - Argo CD:
        icon: argocd.png
        href: https://argo.veliz.cc
        description: GitOps
    - Gatus:
        icon: mdi-heart-pulse
        href: https://gatus.veliz.cc
        description: Service health
        siteMonitor: https://gatus.veliz.cc

- Observability & storage:
    - Grafana:
        icon: grafana.png
        href: https://grafana.veliz.cc
        description: Dashboards (Grafana Operator)
        siteMonitor: https://grafana.veliz.cc/login
    - Prometheus:
        icon: prometheus.png
        href: https://prometheus.veliz.cc
        description: Metrics (kube-prometheus-stack)
        siteMonitor: https://prometheus.veliz.cc/-/ready
    - Alertmanager:
        icon: mdi-bell-alert
        href: https://alertmanager.veliz.cc
        description: Alert UI
        siteMonitor: https://alertmanager.veliz.cc/-/ready
    - Victoria Logs:
        icon: mdi-text-box-search-outline
        href: https://victoria-logs.veliz.cc/select/vmui/
        description: Logs (Fluent Bit → Victoria Logs)
        siteMonitor: https://victoria-logs.veliz.cc/select/vmui/
    - Longhorn:
        icon: longhorn.png
        href: https://longhorn.veliz.cc
        description: Block storage UI
        siteMonitor: https://longhorn.veliz.cc

- Media:
    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.veliz.cc
        description: Series management
        siteMonitor: https://sonarr.veliz.cc
        widget:
          type: sonarr
          url: https://sonarr.veliz.cc
          key: {{HOMEPAGE_VAR_SONARR_API_KEY}}
    - Radarr:
        icon: radarr.png
        href: https://radarr.veliz.cc
        description: Movie management
        widget:
          type: radarr
          url: https://radarr.veliz.cc
          key: {{HOMEPAGE_VAR_RADARR_API_KEY}}
    - Tautulli:
        icon: tautulli.png
        href: https://tautulli.veliz.cc
        description: Plex stats
        siteMonitor: https://tautulli.veliz.cc
        widget:
          type: tautulli
          url: https://tautulli.veliz.cc
          key: {{HOMEPAGE_VAR_TAUTULLI_API_KEY}}
    - Sabnzbd:
        icon: sabnzbd.png
        href: https://sabnzbd.veliz.cc
        description: Download client
        widget:
          type: sabnzbd
          url: https://sabnzbd.veliz.cc
          key: {{HOMEPAGE_VAR_SABNZBD_API_KEY}}
    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.veliz.cc
        description: Indexer manager
        widget:
          type: prowlarr
          url: https://prowlarr.veliz.cc
          key: {{HOMEPAGE_VAR_PROWLARR_API_KEY}}
    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.veliz.cc
        description: Subtitles
