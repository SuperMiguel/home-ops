# Syncs Homelab 1Password items → Kubernetes Secret media-arr-api (namespace media).
# remoteRef: homelab-media-api-keys (stack API keys, SAB creds, NZB, session secret),
#   homelab-pushover (PUSHOVER_USER_KEY, PUSHOVER_APP_KEY for Buildarr).
# Concealed fields on homelab-media-api-keys: SONARR_API_KEY, RADARR_API_KEY, PROWLARR_API_KEY,
# SABNZBD_API_KEY, SABNZBD_SERVER_USERNAME, SABNZBD_SERVER_PASSWORD,
# NEWZNAB_API_KEY (NZBgeek API key for Prowlarr Newznab indexer),
# TAUTULLI_API_KEY, BAZARR_API_KEY, SEERR_API_KEY, AUTOBRR_SESSION_SECRET.
# homelab-pushover: PUSHOVER_USER_KEY, PUSHOVER_APP_KEY_* per app (see externalsecret-notifier.yaml).
# Buildarr reads PUSHOVER_APP_KEY from the Secret — map it to an existing app key (here: Sonarr) or add
# a dedicated PUSHOVER_APP_KEY / PUSHOVER_APP_KEY_PROWLARR field in 1Password if you want separation.
# notifier (externalsecret-notifier.yaml), Gatus, Alertmanager — see those manifests.
# UniFi Poller: homelab-unifi-poller — externalsecret-unpoller.yaml.
# Grafana: homelab-grafana — externalsecret-grafana.yaml.
# If sync fails, open each field in 1Password → Copy Secret Reference and compare path segments.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: media-arr-api
  namespace: media
spec:
  refreshInterval: 6h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: media-arr-api
    creationPolicy: Owner
  data:
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SONARR_API_KEY
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/RADARR_API_KEY
    - secretKey: PROWLARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/PROWLARR_API_KEY
    - secretKey: SABNZBD_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SABNZBD_API_KEY
    - secretKey: SABNZBD_SERVER_USERNAME
      remoteRef:
        key: homelab-media-api-keys/SABNZBD_SERVER_USERNAME
    - secretKey: SABNZBD_SERVER_PASSWORD
      remoteRef:
        key: homelab-media-api-keys/SABNZBD_SERVER_PASSWORD
    - secretKey: NEWZNAB_API_KEY
      remoteRef:
        key: homelab-media-api-keys/NEWZNAB_API_KEY
    - secretKey: TAUTULLI_API_KEY
      remoteRef:
        key: homelab-media-api-keys/TAUTULLI_API_KEY
    - secretKey: BAZARR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/BAZARR_API_KEY
    - secretKey: SEERR_API_KEY
      remoteRef:
        key: homelab-media-api-keys/SEERR_API_KEY
    - secretKey: AUTOBRR_SESSION_SECRET
      remoteRef:
        key: homelab-media-api-keys/AUTOBRR_SESSION_SECRET
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: homelab-pushover/PUSHOVER_USER_KEY
    - secretKey: PUSHOVER_APP_KEY
      remoteRef:
        key: homelab-pushover/PUSHOVER_APP_KEY_SONARR
