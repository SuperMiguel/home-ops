---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homebridge-downstairs
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # After home-cluster-secrets (wave -5) so init has HUBITAT_*_ACCESS_TOKEN.
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/SuperMiguel/home-ops.git"
      targetRevision: main
      ref: repo
    - repoURL: "https://github.com/SuperMiguel/home-ops.git"
      path: kubernetes/apps/home/homebridge-downstairs/resources
      targetRevision: main
    - repoURL: ghcr.io/bjw-s-labs/helm
      chart: app-template
      targetRevision: 5.0.1
      helm:
        releaseName: homebridge-downstairs
        valueFiles:
          - $repo/kubernetes/apps/home/homebridge-downstairs/values.yaml
  destination:
    name: in-cluster
    namespace: home
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
