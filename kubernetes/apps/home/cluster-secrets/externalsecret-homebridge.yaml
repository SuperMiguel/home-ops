# 1Password item: homelab-homebridge
#   HUBITAT_UPSTAIRS_ACCESS_TOKEN  (concealed) — homebridge-upstairs init
#   HUBITAT_DOWNSTAIRS_ACCESS_TOKEN (concealed) — homebridge-downstairs init
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homebridge-secrets
  namespace: home
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homebridge-secrets
    creationPolicy: Owner
  data:
    - secretKey: HUBITAT_UPSTAIRS_ACCESS_TOKEN
      remoteRef:
        key: homelab-homebridge/HUBITAT_UPSTAIRS_ACCESS_TOKEN
    - secretKey: HUBITAT_DOWNSTAIRS_ACCESS_TOKEN
      remoteRef:
        key: homelab-homebridge/HUBITAT_DOWNSTAIRS_ACCESS_TOKEN
