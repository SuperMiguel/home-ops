# API key: Secret media-arr-api (ExternalSecret → 1Password item media-arr-api, field PROWLARR_API_KEY).
# linuxserver/s6: must start as root; PUID/PGID map app data ownership. Do not use runAsNonRoot + UID 1000.
# To feed Radarr indexers: Settings → Apps → Add Radarr — http://radarr.media.svc.cluster.local:80 + Radarr API key.
controllers:
  prowlarr:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 1.37.0
        env:
          TZ: America/New_York
          PUID: "1000"
          PGID: "1000"
          PROWLARR__APP__INSTANCENAME: Prowlarr
          PROWLARR__APP__THEME: dark
          PROWLARR__AUTH__METHOD: External
          PROWLARR__AUTH__REQUIRED: DisabledForLocalAddresses
          PROWLARR__LOG__DBENABLED: "False"
          PROWLARR__LOG__LEVEL: info
          PROWLARR__SERVER__PORT: "80"
          PROWLARR__UPDATE__BRANCH: develop
          PROWLARR__AUTH__APIKEY:
            valueFrom:
              secretKeyRef:
                name: media-arr-api
                key: PROWLARR_API_KEY
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 45
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
            add:
              - SETUID
              - SETGID
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 768Mi
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 1000
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
service:
  app:
    ports:
      http:
        port: 80
route:
  app:
    hostnames:
      - prowlarr.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 80
