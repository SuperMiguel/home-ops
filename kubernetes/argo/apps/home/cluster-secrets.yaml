---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-cluster-secrets
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: kubernetes
  source:
    repoURL: "https://github.com/SuperMiguel/home-ops.git"
    path: kubernetes/apps/home/cluster-secrets
    targetRevision: main
  destination:
    name: in-cluster
    namespace: home
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
