# Pushover: media-arr-api PUSHOVER_USER_KEY + PUSHOVER_APP_KEY (same as Buildarr / Prowlarr).
# Builds Apprise pover:// URLs for the webhook scripts (onedr0p uses separate 1Password items per app).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notifier-secret
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: notifier-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        APPRISE_RADARR_PUSHOVER_URL: "pover://{{ .PUSHOVER_USER_KEY }}@{{ .PUSHOVER_APP_KEY }}"
        APPRISE_SEERR_PUSHOVER_URL: "pover://{{ .PUSHOVER_USER_KEY }}@{{ .PUSHOVER_APP_KEY }}"
        APPRISE_SONARR_PUSHOVER_URL: "pover://{{ .PUSHOVER_USER_KEY }}@{{ .PUSHOVER_APP_KEY }}"
  data:
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: media-arr-api/PUSHOVER_USER_KEY
    - secretKey: PUSHOVER_APP_KEY
      remoteRef:
        key: media-arr-api/PUSHOVER_APP_KEY
