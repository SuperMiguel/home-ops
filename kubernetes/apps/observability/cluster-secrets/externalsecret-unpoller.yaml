# UniFi read-only account for UniFi Poller (Settings → Users → Add user → Role: Read Only).
# 1Password item homelab-unifi-poller: UNIFI_POLLER_USER, UNIFI_POLLER_PASSWORD.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unpoller
  namespace: observability
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: unpoller-secret
    creationPolicy: Owner
  data:
    - secretKey: UNIFI_USER
      remoteRef:
        key: homelab-unifi-poller/UNIFI_POLLER_USER
    - secretKey: UNIFI_PASSWORD
      remoteRef:
        key: homelab-unifi-poller/UNIFI_POLLER_PASSWORD
