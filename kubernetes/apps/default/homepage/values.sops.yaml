controllers:
  homepage:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.1.0
        env:
          HOMEPAGE_ALLOWED_HOSTS: home.veliz.cc
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 3000
                httpHeaders:
                  - name: Host
                    value: home.veliz.cc
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
          limits:
            memory: 512Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
service:
  app:
    ports:
      http:
        port: 3000
configMaps:
  services:
    data:
      services.yaml: ENC[AES256_GCM,data:,iv:Js4jeIpY5B8h94Cp57Ws/D50j8PeMmPvTJbz/cT7SUE=,tag:DdIEYE8ewYyKjsH1xwPuoA==,type:str]
      settings.yaml: ENC[AES256_GCM,data:,iv:2bh4nT2j9HmO5WymuJEfJINhb/4h4JmuRlaegtXKgic=,tag:V5mFAJodqA8W1kfZKh/j2w==,type:str]
      widgets.yaml: ENC[AES256_GCM,data:,iv:OuUW9QRlkcb4PYNbKv2dRaAS4xMyKxW0FRfdeoW+MvU=,tag:i1mu7w6Xdvs6KarcTAEj4A==,type:str]
      bookmarks.yaml: ENC[AES256_GCM,data:,iv:J5wRyUEYtTxythYNptW+NHrdTnBxe7AhP9qWkDn4Cic=,tag:tvtfvbITVHzyTO3C5BOJrQ==,type:str]
persistence:
  config-workspace:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config
  services:
    type: configMap
    identifier: services
    globalMounts:
      - path: /app/config/services.yaml
        subPath: services.yaml
      - path: /app/config/settings.yaml
        subPath: settings.yaml
      - path: /app/config/widgets.yaml
        subPath: widgets.yaml
      - path: /app/config/bookmarks.yaml
        subPath: bookmarks.yaml
route:
  app:
    hostnames:
      - home.veliz.cc
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 3000
