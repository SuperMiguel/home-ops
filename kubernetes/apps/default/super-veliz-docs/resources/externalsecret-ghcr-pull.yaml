# Private Super-Veliz-Network repo → GHCR package is private; nodes need registry auth to pull.
#
# 1Password: create item "homelab-ghcr-super-veliz" with:
#   - GHCR_USERNAME — your GitHub username (same account that owns the PAT)
#   - GHCR_TOKEN    — GitHub PAT with read:packages (and read if fine-grained)
#
# GitHub Actions still publishes with GITHUB_TOKEN; the cluster uses this PAT only to pull.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-super-veliz-pull
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ghcr-super-veliz-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":{{ printf "%s:%s" .GHCR_USERNAME .GHCR_TOKEN | b64enc | quote }}}}}
  data:
    - secretKey: GHCR_USERNAME
      remoteRef:
        key: homelab-ghcr-super-veliz/GHCR_USERNAME
    - secretKey: GHCR_TOKEN
      remoteRef:
        key: homelab-ghcr-super-veliz/GHCR_TOKEN
